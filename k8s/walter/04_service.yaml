apiVersion: v1
kind: Service
metadata:
  name: zeroclaw-k8s-agent
  namespace: ai-agents
spec:
  selector:
    app: zeroclaw-k8s-agent
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
    - name: a2a
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
