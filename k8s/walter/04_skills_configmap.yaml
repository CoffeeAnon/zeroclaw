    # Cron Management — Walter

    Sam's `cron-management` skill is the canonical reference for shared
    cron rules: frequency guidance, slot budget, isolated-session prompt
    discipline, the `cron_run` infinite-loop guard, exit conditions,
    parameters checklist, and review hygiene. Read it for the rules
    themselves; this skill only documents how Walter's situation differs.

    ## Walter-specific deltas

    - **Tool surface is read-only.** Walter's cron prompts must follow
      the `cluster-health-monitor` skill — observe and report, never
      `apply / create / patch / delete / scale / rollout restart`. If a
      cron prompt would naturally end in a mutation, it belongs to Sam,
      not Walter.
    - **No Vikunja, no Signal.** Walter has no `vikunja` CLI and no
      Signal channel. Cron `delivery` is effectively `none` or `acp`
      (reporting back to Sam). Don't write prompts that try to message
      Dan directly.
    - **Memory store is Serena, not Sam's `memory_store`.** Save
      baselines and recurring-symptom notes via Serena memory keys (see
      `cluster-health-monitor` "Memory Strategy"). Cron prompts that
      need prior state should `memory_recall` from Serena, not assume
      Sam's memory layer.
    - **Crons that need cluster-wide context** must include the explicit
      scope-narrowing rule from `cluster-health-monitor` Step 2 — avoid
      `kubectl get all -A` in any cron prompt.
    - **PR follow-ups are Walter's.** Crons that monitor Walter's open
      PRs in scrapyard-applications belong here. They should use the
      gitea-pr tooling and report status back to Sam via ACP.

    ## Slot-budget reminder

    Walter shares the same GPU backend as Sam and interactive users. The
    same 4-slot ceiling and 0–14 minute jitter described in Sam's skill
    apply here. If Walter has 3+ agent crons already, merge before adding.
