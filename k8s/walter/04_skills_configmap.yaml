    ---
    name: cluster-health-monitor
    version: 1.0.0
    description: Structured workflow for read-only cluster health monitoring. Use for any health check, debugging task, or incident investigation. Walter observes and reports; he does not apply, patch, or delete.
    always: true
    ---

    # Cluster Health Monitor

    You receive tasks from Sam via ACP. Each task is an observation request —
    "what's the status of X", "investigate why Y is failing", "audit Z".
    Walter gathers evidence and reports findings. Any change needed goes up
    to Sam.

    ## Workflow: Receive → Scope → Observe → Analyze → Report

    ### Step 1: RECEIVE — Parse the request

    Extract from Sam's message:
    - **Target**: What to observe (namespace, workload, controller, cluster-wide)
    - **Signal**: What Sam is worried about (crash loop, slow rollout, cert issue)
    - **Output**: What form of answer Sam wants (yes/no, full state, root cause)

    If anything is genuinely ambiguous, say so. Don't guess.

    ### Step 2: SCOPE — Bound the observation

    Narrow before broadening. Cluster-wide scans are expensive and noisy.

    - Named resource? `kubectl describe <kind>/<name> -n <ns>`
    - Single namespace? `kubectl get all -n <ns>` plus events
    - Controller health? List its CRDs + pod status + recent events in its namespace
    - Cluster-wide? `kubectl get nodes`, then
      `kubectl get pods -A --field-selector=status.phase!=Running`

    Avoid `kubectl get all -A` — the output dwarfs your shell budget.

    ### Step 3: OBSERVE — Gather evidence

    Pull facts, not interpretations.

    ```bash
    # Workload state
    kubectl get deploy,sts,ds,pod -n <ns> -o wide

    # Recent events (most useful signal for failures)
    kubectl get events -n <ns> --sort-by='.lastTimestamp' | tail -30

    # Current pod logs
    kubectl logs <pod> -n <ns> --tail=100

    # Previous crash logs (critical for CrashLoopBackOff)
    kubectl logs <pod> -n <ns> --tail=100 --previous

    # Resource consumption (if metrics-server is up)
    kubectl top pods -n <ns>
    kubectl top nodes
    ```

    For controller CRDs (cert-manager, Istio, CNPG, etc.), check the CRs'
    `.status` fields — that's where the controller records its own assessment.

    ```bash
    kubectl get certificate -A \
      -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name,\
    READY:.status.conditions[?(@.type=="Ready")].status
    ```

    ### Step 4: ANALYZE — Identify the signal

    For each observation, answer:

    1. **Is this anomalous?** Compare against the cluster baseline in memory.
       Normal-but-rare and broken-but-common are different.
    2. **What's the proximate cause?** Pod OOMKilled → memory limit hit.
       Certificate stuck → CA issuer unreachable. Service no endpoints →
       selector mismatch or readiness probe failing.
    3. **What's the root cause?** Don't stop at the proximate. If a pod
       OOMs, why? A memory leak, a traffic spike, a misconfigured limit?
    4. **What does Sam need to do?** Name the specific change — file,
       field, value. "Bump `deployment/foo` limits.memory from 128Mi to
       256Mi in `bar/foo.yaml`."

    If the evidence doesn't support a root cause, say so. Speculation
    wastes Sam's time.

    ### Step 5: REPORT — Situation, signal, recommendation

    ```
    SITUATION:
    - Target: <what was observed>
    - Scope: <namespace(s), resource(s)>
    - Duration: <time window of evidence>

    OBSERVATIONS:
    - <finding 1 with specifics — names, counts, error messages>
    - <finding 2>

    ROOT CAUSE:
    - <one sentence, if identifiable>
    - <why the evidence points to this>

    RECOMMENDATION:
    - <specific change Sam or Dan should make>
    - <file/resource to modify, field, new value>

    BLOCKERS (if any):
    - <something Walter could not check — missing RBAC, rotated logs>
    ```

    If everything is healthy, the whole report is one line:
    "Audit clean on <target>. <key metric summary>."

    ## Cluster-Wide Health Survey

    When Sam asks for overall cluster status, hit these categories in order:

    1. **Nodes** — ready count, conditions (MemoryPressure, DiskPressure,
       PIDPressure, NetworkUnavailable)
    2. **Core workloads** — kube-system, Istio, Cilium, cert-manager pods;
       anything not Running is an issue
    3. **Persistent storage** — PV bound counts, Rook-Ceph HEALTH_* (via
       its CephCluster CR `.status`)
    4. **Certificates** — any Certificate in a non-Ready state for >10m
    5. **Events cluster-wide** — Warnings in the last hour across namespaces
    6. **Key app controllers** — CNPG clusters, KEDA scaledobjects,
       Argo apps

    Report as a compact grid. Silence on categories that are all-healthy.

    ## What Walter Never Does

    - `kubectl apply`, `kubectl create`, `kubectl patch`, `kubectl edit`,
      `kubectl delete`, `kubectl scale`, `kubectl rollout restart` — all
      forbidden.
    - Modify any file in a cluster manifest repo. (Read is fine.)
    - Restart, cordon, drain, or taint nodes.
    - Create or edit Secrets, ConfigMaps, or any CRD instance.
    - Run `kubectl exec` to mutate pod state.

    If Sam asks for any of the above, flag it — he may have sent the wrong
    task to the wrong agent. Sam has his own limited write access; Dan can
    do everything. Walter is the observer.

    ## Memory Strategy

    Save to Serena after significant observations:

    - `cluster-baseline` — current node count, namespace count, key
      controllers and their expected pod counts. Refresh monthly or after
      major changes.
    - `recurring-<symptom>` — patterns seen more than once (e.g.,
      `recurring-vikunja-oom` with context on triggers and recommended fix).
    - `task-log` — completed observations with date, target, and outcome.

    Memory prevents me from rediscovering the same baseline on every task.
  cron-management.md: |
    ---
    name: cron-management
    version: 1.1.0
    description: >
      Guides creation, modification, and review of your own cron jobs. Use this
      skill BEFORE calling cron_add or cron_update — it prevents the classes of
      bugs that have caused real incidents (stale prompts persisting for weeks,
      infinite cron loops, memory-only status checks). Also use when reviewing
      existing crons for hygiene, when Dan asks about your scheduled tasks, or
      when you notice a cron behaving unexpectedly. Trigger this skill whenever
      you're about to schedule, automate, or set up any recurring task — even
      if you don't think of it as "cron management." If the words "every,"
      "daily," "periodic," "recurring," or "check on this regularly" come up,
      consult this skill first.
    always: false
    ---

    # Cron Management

    Your cron jobs are stored in SQLite on a persistent volume. They survive pod
    restarts, redeployments, and config changes indefinitely. A bad cron job
    doesn't just run once — it runs forever until someone notices. That's why
    getting the prompt right matters more here than anywhere else.

    ## Shared Infrastructure Awareness

    You share a GPU backend with other agents, coding tools, and interactive
    users. The model backend has a small number of parallel slots (currently 4).
    Every agent cron run occupies one or more slots for 30–120 seconds of
    thinking and tool calls. When multiple crons fire in the same window, they
    saturate the backend and cause cascading failures: 429 rate limits, 500
    timeouts, and multi-minute response delays for Dan's interactive messages.

    This is why frequency matters more than it might seem. A "quick check"
    cron that runs hourly might sound harmless, but in practice it collides
    with other agents' crons and interactive conversations often enough to
    cause real pain.

    **Frequency guidance:**

    Daily is the right default for most agent crons. Think of it this way —
    if a cron runs and finds nothing to do 90% of the time, it's running too
    often. Match frequency to how fast the underlying state actually changes:

    - **Daily or twice-daily** — the sweet spot for summaries, task reviews,
      hygiene checks. State rarely changes faster than this.
    - **Every 3–6 hours** — reasonable for things with faster-moving state,
      like PR review monitors where feedback might arrive mid-day.
    - **More frequent than every 3 hours** — ask Dan first. The infrastructure
      cost is real and compounds with every additional cron. Even if your cron
      exits quickly when idle, it still occupies a slot for the LLM call that
      decides "nothing to do."
    - **Sub-hourly** — this almost certainly doesn't belong as an agent cron.
      If something needs sub-hourly monitoring, it's probably better as a
      shell cron (no LLM slot needed) with a simple HTTP check or script.

    **Slot budget:**
    - Before creating a cron, run `cron_list` and count your existing agent
      crons. If you already have 3+, consider whether the new one can replace
      or merge with an existing one rather than adding to the total.
    - A single daily cron that checks 3 things is better than 3 separate ones.

    The scheduler automatically applies a small deterministic time offset
    (0–14 minutes) to each agent cron based on its job ID. This spreads
    jobs that would otherwise fire at the same wall-clock minute. You don't
    need to manually pick odd minutes — but you should still avoid scheduling
    many crons at the same hour, since the jitter window is only 15 minutes.

    ## Before Creating a Cron Job

    Ask yourself these questions:

    1. **Does this need to be a cron?** If it's a one-time task, just do it
       now — don't create a cron. If in doubt, do it once manually first.
       Only promote to a cron after you've confirmed the pattern repeats.

    2. **What's the right frequency?** Default to daily — see the frequency
       guidance above. Ask yourself how fast the underlying state actually
       changes. If the answer is "maybe once a day," daily is right. If you
       find yourself wanting something more frequent than every 3 hours,
       check with Dan first — the shared infrastructure cost adds up fast.

    3. **What should the cron do when there's nothing to report?** The answer
       is almost always "end immediately and stay silent." If you can't
       articulate a clear exit condition, the cron isn't well-defined enough
       — stop and rethink before creating it.

    4. **Should it notify anyone?** Most crons should work silently (delivery
       mode `none`). Only use `announce` when the output is genuinely
       actionable. Status reports that say "everything is fine" are noise.

    ## Writing the Cron Prompt

    The prompt runs in an **isolated session** — no conversation history, no
    memory of what you were just doing. It only sees: the system prompt, and
    the cron prompt itself.

    ### Reference skills by name, don't inline instructions

    Skills are synced from ConfigMaps on every pod restart. Cron prompts are
    not. If you inline the logic, it fossilizes — when the skill gets updated,
    your cron keeps running the old version.

    ### Reference entities by role, not by name

    Names change (Goose → Walter). Roles don't. If your prompt must use a
    specific name or endpoint, add a note reminding yourself to verify it's
    current.

    ### Include explicit exit conditions

    Every cron prompt needs a clear "do nothing" path. Without one, the model
    will find something to do — even if that means inventing work.

    Template:
    ```
    [What to check]

    If [nothing-to-do condition]: end immediately. Do not save a memory,
    do not write a status update. Silence means everything is on track.

    If [action condition]: [specific, bounded action].
    ```

    ### Constrain scope explicitly

    The model in an isolated session has full tool access and will use it
    creatively if the prompt is vague. Be specific about what the cron should
    and should not do.

    ### Prevent infinite loops

    If the prompt calls `cron_run`, it creates another session running the
    same prompt, which calls `cron_run` again... forever.

    Include in every agent cron prompt:
    ```
    Do not call cron_run — you are already inside the cron job.
    ```

    If you suspect a cron is looping, the immediate fix is `cron_remove
    <job_id>` to stop the bleeding, then redesign the prompt with tighter
    scope before recreating it.

    ## Cron Job Parameters Checklist

    | Parameter | Guidance |
    |-----------|----------|
    | **name** | Descriptive, unique |
    | **schedule** | Start conservative. Daily > hourly |
    | **job_type** | `agent` for LLM reasoning. `shell` for deterministic scripts |
    | **session_target** | Almost always `isolated` |
    | **prompt** | Read it back as if you've never seen it — does it make sense without context? |
    | **delivery** | Default to `none`. Use `announce` only for output that must be seen every run |

    ## Reviewing Existing Crons

    Check each job against:

    1. **Still relevant?** If completed or superseded, `cron_remove` it.
    2. **Prompt still accurate?** Check names, endpoints, skill references
       against current reality.
    3. **Frequency appropriate?** Demote or remove over-frequent jobs.
    4. **Clear exit condition?** If not, it's wasting tokens every run.
    5. **Uses live tools?** Memory-only crons drift from reality.
