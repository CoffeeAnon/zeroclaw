data:
  daily-meeting-summary.md: |
    ---
    name: daily-meeting-summary
    description: >
      Cron-driven daily rollup of Dan's Speakr recordings into an exec
      summary, Vikunja tasks in project 1, a memory digest, and wiki
      distillations. Fires weekdays at 12:00 and 17:00 America/Vancouver.
      Use whenever the daily cron prompt invokes it. For ad-hoc questions
      Dan asks about specific past meetings (reframe, details, verbatim
      content), use the `speakr-lookup` skill instead — this skill owns
      the scheduled rollup, not interactive lookup.
    always: false
    ---

    # Daily Meeting Summary

    Speakr (meetings.coffee-anon.com) is Dan's self-hosted meeting
    transcription app. This skill is the scheduled pipeline that turns
    the day's recordings into an exec summary, Vikunja tasks in project
    1 (Dan's inbox), a memory breadcrumb, and durable wiki entries.

    For ad-hoc questions about a specific meeting from any day (Dan asks
    "reframe the Tomas 1:1", "what did we agree on", "pull the transcript
    for X") — use `speakr-lookup`. It owns on-demand fetch. This skill
    owns the cron.

    ## Runtime rules

    - **Absolute paths only** for meeting/wiki content. Your cwd is
      `/data/.zeroclaw/workspace/`; meeting and wiki files live at
      `/data/workspace/`. Relative paths silently resolve wrong.
    - **Do not re-read a file you already read this turn.** Tool results
      stay in context. Re-reading doubles tokens per request and triggers
      provider HTTP timeouts mid-turn. If you need a specific slice, use
      `file_read` with `offset`/`limit`.
    - Rationale, edge cases, API reference, and history live in
      `docs/sam-skills/daily-meeting-summary-design.md` (repo-side, not
      runtime-loaded).

    ## Workflow — 5 steps

    ### Step 1 — Fetch and aggregate

    ```
    shell: python3 /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-fetch.py
    ```

    The script writes `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md`
    (the primary input for step 2) and a memory/ duplicate. It also
    re-fetches the past 3 days to catch late transcripts and annotations.

    Script stdout is ground truth. The exact sentinel strings below are
    defined by `speakr-fetch.py`; if the script evolves, keep this list
    in sync or Sam's branching desyncs silently. Branch on what it
    prints:

    - **`NO_CHANGES: ...`** — reply literally `NO_REPLY`, stop. No other
      text. Do not run steps 2-5. This keeps Sam off the LLM budget when
      there's nothing to do.
    - **`Wrote N meetings to meetings-YYYY-MM-DD.md. [K failed.] [M still
      processing.] [G summaries flagged as possibly malformed.] [New since
      last run: ...]`** — continue through steps 2-5. Surface failed /
      pending / garbage counts to Dan in your final reply when non-zero.
    - **`CHANGED sources (late transcripts): files`** — prior days whose
      transcripts landed since last run. Action items were never captured
      by the previous cron. Run step 3 on each of these files (in
      addition to today's primary). Skip step 2 for them (no exec summary
      for prior dates).
    - **`CHANGED sources (annotated): files`** — prior days Dan edited.
      Re-distill in step 5 only. Do not re-run step 3 — originals were
      captured on the first pass; re-creating their tasks duplicates them.

    ### Step 2 — Executive summary

    Only for today's primary date. If step 1 reported zero meetings today
    but named files in `CHANGED sources (late transcripts)`, skip step 2
    entirely and jump to step 3.

    ```
    file_read  /data/workspace/wiki/sources/meetings-YYYY-MM-DD.md
    file_write /data/workspace/memory/meetings-exec-YYYY-MM-DD.md
    ```

    Keep the four headings exactly (Dan scans for them); wording within
    each section can follow whatever reads cleanly:

    ```markdown
    # Meetings — YYYY-MM-DD

    ## Action items for Dan
    - **<action>** — from **<meeting title>**. Context: <1-2 lines>. Due: <date or "no deadline given">.

    ## Action items others owe Dan
    - **<name>** owes **<action>** — from **<meeting title>**. Due: <date or "no deadline given">.

    ## Key decisions and issues
    - <one-line decision or issue> — from **<meeting title>**.

    ## Recording status
    - New recordings since last run: <titles, or "none">.
    - Recordings still processing: <titles, or "none">.
    ```

    Empty section → write `- None today.` (don't omit the heading; Dan
    scans for the headers).

    ### Step 3 — Create Vikunja tasks in project 1

    Three phases: gather → dedup → batch-create. The
    `vikunja-project-manager` skill has the full CLI reference if you
    need it; this step only specifies meeting-specific pieces.

    #### Phase 1 — Gather candidates

    Take **only** the bullets immediately under the `## Action items for
    Dan` heading in today's exec-summary file, stopping at the next `##`
    heading. Skip vague items ("look into X", "think about Y") — Vikunja
    is for things with a verb, a noun, and ideally a deadline.

    Skip items under these sections — they aren't Dan-bucket tasks:

    - `## Action items others owe Dan` — those are for Dan to *nudge*,
      not do. Filing them as his tasks puts other people's obligations
      on his inbox. On 2026-04-22 this exact mistake filed 10 other
      people's action items as Dan's; see `task-tracking` v1.3.0 for
      the fix.
    - `## Key decisions and issues` — decisions are wiki material
      (step 5), not task material.

    For each file in `CHANGED sources (late transcripts)` from step 1,
    also extract items from the per-meeting `## Action Items` sections
    of `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md` (no exec
    summary exists for backfill days). Tag each as a backfill item.
    While reading, if a recording's `### Summary` starts with
    `*Warning: summary appears malformed`, drop that recording entirely
    — no task, no wiki entry — and log the recording ID for Dan.

    Ignore `CHANGED sources (annotated)` files here. Their originals
    were captured on the day they first landed; the annotations go to
    step 5.

    #### Phase 2 — Dedup against existing

    ```
    shell: vikunja tasks 1 --format json
    ```

    Filter `done == false` first (the CLI returns both open and
    completed; you don't want to skip creating a new task just because
    Dan closed an identically-named one last month). Walk the filtered
    JSON and match each candidate's title against existing open titles.
    For close-but-not-identical matches, `vikunja task show <id>` to
    check the description and comments — if already captured, skip;
    otherwise keep.

    #### Phase 3 — Batch create

    Follow `vikunja-project-manager` for CLI mechanics. Meeting-specific
    deltas:

    - **Project is always `1` (Dan's inbox).** Same-day + late-backfill
      go in one JSON array, written to
      `/data/.zeroclaw/workspace/tasks-YYYY-MM-DD.json`.
    - **Per-task fields**: `title` = verb + noun (no provenance);
      `priority` = `4` if due ≤7 days else `3`; `due` = `"YYYY-MM-DD"`
      when given, omit otherwise; `description` = `"From <meeting>."`
      for same-day or `"(late backfill from YYYY-MM-DD) From <meeting>."`
      for backfill; `labels` = `["from-meeting"]`.
    - **Do not** pass `--assignee dan` — the token 401s on user lookups;
      project ownership routes correctly without it.
    - **Zero surviving candidates** → skip Phase 3 entirely (no empty
      array, no tmp file).
    - **Leave the tmp JSON in place** after the call — per-day record of
      what Sam tried to create.
    - **`F > 0` from batch-create** (exits 1 by design) → continue to
      steps 4 and 5; surface failed titles to Dan in the final reply.

    ```
    shell: vikunja task batch-create 1 --file /data/.zeroclaw/workspace/tasks-YYYY-MM-DD.json
    ```

    ### Step 4 — Memory digest

    Short pointer, not content. The wiki is the durable store.

    ```
    memory_store key=meetings_digest_YYYY-MM-DD category=daily \
      value="N meetings. Files: /data/workspace/wiki/sources/meetings-YYYY-MM-DD.md, /data/workspace/memory/meetings-exec-YYYY-MM-DD.md. Theme: <one sentence>."
    ```

    ### Step 5 — Wiki distillation

    **Delegate page format to the `wiki-management` skill** — that's
    where directory structure, page template, and cross-reference rules
    live. This step only names the files to distill:

    1. Today's source file — always.
    2. Every file in `CHANGED sources (late transcripts)` (first-time
       processing).
    3. Every file in `CHANGED sources (annotated)` (Dan's notes may add
       new decisions or context).

    Be conservative. Not every meeting deserves a page — trivial status
    updates dilute the wiki. Update `index.md` and append to `log.md`
    for anything you create or materially change.

    ## Ad-hoc questions → speakr-lookup

    If Dan asks about a specific meeting outside the cron flow — summary
    of a particular day, a named meeting, a participant, or "fetch the
    transcript for X" — switch to the `speakr-lookup` skill. It owns
    search, metadata, and full-transcript fetch. Don't run this skill's
    steps 1-5 for ad-hoc lookups; they're cron-shaped and will create
    duplicate tasks and wiki pages.

    ## Quick failure triage

    - Script prints `NO_CHANGES:` → reply `NO_REPLY`, done.
    - Script fails twice (5xx / connection error) → surface to Dan, stop.
    - `file_read` "not found" on a source file → you used a relative
      path. Retry with the full `/data/workspace/...` path.
    - Mid-turn provider timeouts with exponential backoff → context too
      big. Stop re-reading files; finish the summary from what you
      already have.

    Full failure-mode reference in the design doc
    (`docs/sam-skills/daily-meeting-summary-design.md`).

  speakr-fetch.py: |
    #!/usr/bin/env python3
    """Fetch and aggregate daily meeting recordings from Speakr.

    Usage: python3 speakr-fetch.py [YYYY-MM-DD] [--lookback N]
    Defaults to today. --lookback N also re-fetches the past N days
    to detect updated annotations (default: 3).

    Writes to both wiki/sources/ (primary, immutable-ish raw layer)
    and memory/ (backward compat for exec summary workflow).
    Reports which source files changed so Sam can re-distill them.
    """
    import json, os, urllib.request, datetime, pathlib, sys

    BASE = 'https://meetings.coffee-anon.com'
    TOKEN = os.environ['SPEAKR_API_TOKEN']
    WIKI_SOURCES = '/data/workspace/wiki/sources'
    MEM = '/data/workspace/memory'
    DROP = {'transcription','transcription_text','summary_html','notes_html',
            'audio_available','audio_deleted_at','can_delete','can_edit',
            'deletion_exempt','file_size','mime_type','original_filename',
            'processing_time_seconds','transcription_duration_seconds',
            'is_highlighted','is_inbox','is_owner','is_shared','has_group_tags',
            'user_id','completed_at','created_at'}

    # Self-documenting header prepended to every digest file so a
    # file_read on this path can't be mistaken for a transcript.
    DIGEST_BANNER = (
        '> **This file is a digest, not a transcript.** Each meeting below '
        'shows only a short summary. For verbatim content (what was actually '
        'said, who said what, exact wording), use the `speakr-lookup` skill '
        '— run `speakr-cli.py search` to find the meeting, then `get <id>` '
        'to fetch the full transcript. Do not answer questions about meeting '
        'content from this digest alone.\n\n'
    )

    # Parse args
    dates_to_fetch = []
    lookback = 3
    args = sys.argv[1:]
    i = 0
    while i < len(args):
        if args[i] == '--lookback' and i + 1 < len(args):
            lookback = int(args[i + 1])
            i += 2
        else:
            dates_to_fetch.append(args[i])
            i += 1

    today = datetime.date.today()
    if not dates_to_fetch:
        dates_to_fetch.append(today.isoformat())

    # Add lookback days
    for d in range(1, lookback + 1):
        past = (today - datetime.timedelta(days=d)).isoformat()
        if past not in dates_to_fetch:
            dates_to_fetch.append(past)

    def api(path):
        r = urllib.request.Request(f'{BASE}{path}',
            headers={'Authorization': f'Bearer {TOKEN}'})
        return json.loads(urllib.request.urlopen(r).read())

    def read_existing(path):
        """Return the file's text contents, or None if it doesn't exist."""
        if not path.exists():
            return None
        return path.read_text()

    def classify_change(old_text, new_text):
        """Classify how a meeting file's content changed between two runs.

        Returns one of:
          ''                — unchanged
          'late-transcripts' — prior file was the 'no completed recordings'
                              placeholder (or missing) and the new file has
                              real meeting headers. These need Step 3
                              because action items were NOT captured by the
                              previous cron run.
          'annotated'        — prior file already had real meeting headers
                              and the content differs. Treat as Dan's notes;
                              re-distill into the wiki in Step 5 but do not
                              re-run Step 3 (action items were captured
                              on the original pass).
        """
        if old_text == new_text:
            return ''
        old_has_meetings = bool(old_text and '\n## ' in old_text)
        new_has_meetings = '\n## ' in new_text
        if not old_has_meetings and new_has_meetings:
            return 'late-transcripts'
        return 'annotated'

    def extract_time(meeting_date):
        """Pull HH:MM from a Speakr meeting_date string.

        Speakr has shipped both 'YYYY-MM-DDTHH:MM:SS' and
        'YYYY-MM-DD HH:MM:SS' shapes over the years, so we don't hardcode
        offsets — we split on T or space and take the first five chars of
        the time half.
        """
        if not meeting_date:
            return ''
        if 'T' in meeting_date:
            parts = meeting_date.split('T', 1)
        elif ' ' in meeting_date:
            parts = meeting_date.split(' ', 1)
        else:
            return ''
        if len(parts) != 2:
            return ''
        return parts[1][:5]

    def looks_like_garbage_summary(text):
        """Heuristic detection of LLM-hallucinated summary output.

        Triggers on two patterns we have observed on real Speakr recordings
        when the upstream summarization model failed:
          - high ratio of CJK / Hangul / other exotic codepoints in what
            should be English text
          - the literal word 'placeholder' repeated several times
        Both correlate with garbage that must not flow into Vikunja tasks
        or wiki distillation.
        """
        if not text:
            return False
        n = len(text)
        if n < 80:
            return False
        exotic = sum(1 for c in text if ord(c) > 0x2E80)
        if exotic / n > 0.08:
            return True
        if text.lower().count('placeholder') > 3:
            return True
        return False

    def fetch_date(target_date):
        """Fetch recordings for a date, write files, return a dict of counts."""
        wiki_out = pathlib.Path(f'{WIKI_SOURCES}/meetings-{target_date}.md')
        mem_out = pathlib.Path(f'{MEM}/meetings-{target_date}.md')
        old_text = read_existing(wiki_out)

        # Track titles from prior run for new-since-last detection
        previous_titles = set()
        if mem_out.exists():
            for line in mem_out.read_text().splitlines():
                if line.startswith('## '):
                    previous_titles.add(line[3:].strip())

        is_today = target_date == today.isoformat()
        date_query = 'date:today' if is_today else f'date:{target_date}'
        data = api(f'/api/recordings?q={date_query}&per_page=100')
        recs = [r for r in data.get('recordings', []) if r.get('status') == 'COMPLETED']

        if not recs:
            if is_today:
                content = (
                    f'# Meetings — {target_date}\n\n'
                    f'{DIGEST_BANNER}'
                    'No completed meeting recordings for today.\n'
                )
                wiki_out.write_text(content)
                mem_out.write_text(content)
            return {
                'ok': 0, 'failed': 0, 'pending': 0, 'garbage': 0,
                'new': [], 'change_kind': classify_change(old_text, read_existing(wiki_out) or ''),
            }

        ok = 0
        failed = 0
        pending_summaries = 0
        garbage_count = 0
        new_since_last = []
        lines = [f'# Meetings — {target_date}\n\n', DIGEST_BANNER]

        for idx, rec_stub in enumerate(recs):
            rid = rec_stub['id']
            title = rec_stub.get('title', 'Untitled')
            try:
                rec = api(f'/api/recordings/{rid}')
                for k in DROP:
                    rec.pop(k, None)
            except Exception as e:
                lines.append(f'## {title}\n')
                lines.append(f'*Failed to fetch recording {rid}: {e}*\n\n---\n\n')
                failed += 1
                continue

            title = rec.get('title', title)
            participants = rec.get('participants', 'Unknown')
            time_str = extract_time(rec.get('meeting_date', ''))
            tags = ', '.join(t.get('name','') for t in rec.get('tags', []))
            summary = rec.get('summary', '')
            notes = rec.get('notes', '')
            events = rec.get('events', [])

            if title not in previous_titles and previous_titles:
                new_since_last.append(title)

            lines.append(f'## {title}\n')
            lines.append(f'**Participants:** {participants}\n')
            lines.append(f'**Time:** {time_str}\n')
            if tags:
                lines.append(f'**Tags:** {tags}\n')
            lines.append(f'**Transcript:** {BASE}/recording/{rid}\n\n')

            if summary:
                if looks_like_garbage_summary(summary):
                    lines.append(
                        '### Summary\n'
                        '*Warning: summary appears malformed — upstream LLM '
                        'likely hallucinated. Skip this recording for wiki '
                        'distillation and Vikunja task creation; consider '
                        'triggering a manual re-summarize in Speakr. '
                        'Original output below for reference.*\n\n'
                    )
                    lines.append(f'{summary}\n\n')
                    garbage_count += 1
                else:
                    lines.append(f'### Summary\n{summary}\n\n')
            else:
                lines.append('### Summary\n*Summary pending — recording may still be processing.*\n\n')
                pending_summaries += 1

            if events:
                lines.append('### Action Items & Events\n')
                for ev in events:
                    ev_title = ev.get('title', 'Untitled')
                    ev_date = ev.get('start_datetime', '')
                    ev_attendees = ', '.join(ev.get('attendees', []))
                    ev_desc = ev.get('description', '')
                    line = f'- **{ev_title}**'
                    if ev_attendees:
                        line += f' ({ev_attendees})'
                    if ev_date:
                        line += f' — {ev_date}'
                    if ev_desc:
                        line += f': {ev_desc}'
                    lines.append(line + '\n')
                lines.append('\n')

            if notes:
                lines.append(f'### Notes\n{notes}\n\n')

            lines.append('---\n\n')
            ok += 1

        content = ''.join(lines)
        wiki_out.parent.mkdir(parents=True, exist_ok=True)
        wiki_out.write_text(content)
        mem_out.parent.mkdir(parents=True, exist_ok=True)
        mem_out.write_text(content)

        return {
            'ok': ok,
            'failed': failed,
            'pending': pending_summaries,
            'garbage': garbage_count,
            'new': new_since_last,
            'change_kind': classify_change(old_text, content),
        }

    # Fetch all dates. For non-primary (lookback) dates, we split change
    # reports into two flavors so Sam can treat them differently:
    #   - late transcripts: the previous run wrote an empty placeholder
    #     and the transcripts have since landed. Step 3 must run on
    #     these or action items get silently lost.
    #   - annotated: Dan edited an already-populated file. Step 5 should
    #     re-distill, Step 3 should NOT run (originals were already
    #     captured on the first pass).
    late_transcripts = []
    annotated = []
    primary_result = None
    for target_date in dates_to_fetch:
        result = fetch_date(target_date)
        is_primary = target_date == dates_to_fetch[0]

        if is_primary:
            primary_result = result
            parts = [f'Wrote {result["ok"]} meetings to meetings-{target_date}.md']
            if result['failed']:
                parts.append(f'{result["failed"]} failed to fetch')
            if result['pending']:
                parts.append(f'{result["pending"]} still processing')
            if result['garbage']:
                parts.append(f'{result["garbage"]} summaries flagged as possibly malformed')
            if result['new']:
                parts.append(f'New since last run: {", ".join(result["new"])}')
            print('. '.join(parts))
            continue

        if result['change_kind'] == 'late-transcripts':
            late_transcripts.append(f'meetings-{target_date}.md')
        elif result['change_kind'] == 'annotated':
            annotated.append(f'meetings-{target_date}.md')

    if late_transcripts:
        print(f'CHANGED sources (late transcripts): {", ".join(late_transcripts)}')
        print('Run Step 3 on these files — action items were NOT captured by the previous cron.')
    if annotated:
        print(f'CHANGED sources (annotated): {", ".join(annotated)}')
        print('Re-distill in Step 5 only — Dan added notes to already-processed meetings.')

    # Short-circuit signal for the cron agent: emit NO_CHANGES when there's
    # genuinely nothing to process. No new meetings today, none pending, no
    # garbage to surface, and no prior-day changes (late transcripts or
    # annotations). Sam's cron prompt treats this line as the signal to
    # reply with just `NO_REPLY` and skip steps 2-5 entirely.
    pr = primary_result or {'ok': 0, 'failed': 0, 'pending': 0, 'garbage': 0, 'new': []}
    nothing_to_do = (
        pr['ok'] == 0
        and pr['failed'] == 0
        and pr['pending'] == 0
        and pr['garbage'] == 0
        and not pr['new']
        and not late_transcripts
        and not annotated
    )
    if nothing_to_do:
        print('NO_CHANGES: no new meetings today, nothing pending, no prior-day edits. Exit cleanly.')
