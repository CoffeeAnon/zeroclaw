apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-skill-meeting-summary
  namespace: ai-agents
data:
  daily-meeting-summary.md: |
    ---
    name: daily-meeting-summary
    version: 4.2.0
    description: >
      Process Dan's Speakr meeting recordings into an executive summary,
      Vikunja tasks, a memory digest, and wiki distillations. Use whenever
      Dan mentions "today's meetings", "yesterday's standup", action items
      from a call, decisions made in a meeting, or any reference to recent
      meeting content — and for the daily cron that fires weekdays at 12:00
      and 17:00 America/Vancouver.
    always: false
    ---

    # Daily Meeting Summary

    Speakr (meetings.coffee-anon.com) is Dan's self-hosted meeting
    transcription app. This skill turns its raw recordings into things Dan
    actually uses: a 30-second executive summary, actionable Vikunja tasks,
    and durable wiki entries for people, projects, and decisions.

    Tools: `shell`, `file_read`, `file_write`, `memory_store`,
    `memory_recall`, `cron_list`, `cron_add`, `content_search`, `vikunja`.
    Do not use Serena tools for meeting work — they're scoped to code
    workspaces, not Dan's wiki. `curl` is not available; the shipped Python
    scripts use `urllib`.

    ## Why paths are always absolute

    The wiki and meeting files live at `/data/workspace/wiki/` and
    `/data/workspace/memory/`. Your cwd is `/data/.zeroclaw/workspace/`,
    which is a *different directory* on the same PVC. Relative paths like
    `meetings-2026-04-13.md` silently resolve into your cwd and miss the
    real files. **Always use the absolute path** when reading or writing
    meeting and wiki content. `workspace_only = false` in the security
    policy is what makes absolute paths reachable — relative paths still
    join against cwd and will land in the wrong tree.

    ## Context hygiene: do not re-read

    If you already read a file in this turn via `file_read` or
    `shell: cat`, do not re-read it. Its content is still in your
    context from the earlier tool result. Each unnecessary re-read:

    - Doubles the file's tokens in your request body.
    - Pushes total prompt size past the point where Gemma 4 inference
      time exceeds the provider's HTTP timeout, turning a working tool
      loop into a cascade of `error sending request for url` failures
      and wasted retries.
    - Almost always returns the exact same content — a meeting file
      written by `speakr-fetch.py` in step 1 does not change in the
      seconds between two tool calls.

    If you genuinely need to re-examine a file — for example, to
    verify an earlier read was not truncated — use `file_read` with
    explicit `offset` and `limit` to pull only the slice you need,
    rather than re-loading the whole thing. And first ask yourself
    whether the content you already have is actually sufficient to
    make progress: most of the time it is, and the urge to re-read
    is a confidence gap, not a real missing-data problem.

    ## Bootstrap (first run on a new Sam deployment)

    Check `cron_list` for a job named `speakr-daily-summary`. If it's
    missing, create it with `cron_add`:

    - name: `speakr-daily-summary`
    - schedule: `0 12,17 * * 1-5`
    - timezone: `America/Vancouver`
    - job_type: `agent`
    - session_target: `isolated`
    - prompt: the **Cron Prompt** block below, verbatim.

    ### Cron Prompt

    This is what lives in `cron_jobs.prompt` for `speakr-daily-summary`.
    Keep it short. The real workflow is in this skill, not in the cron DB
    — when the cron fires, this skill autoloads and Sam sees both. Any
    duplication between the two is a source of drift and confusion, so
    the cron prompt only names the skill and leaves the steps here.

    ```
    You are in an isolated cron session for speakr-daily-summary.
    Run the daily-meeting-summary skill: steps 1 through 4, in order.
    Do not call cron_run — you are already inside the cron job.
    If step 1 reports zero meetings for today, stop after step 1 and
    exit cleanly with a one-line status. Otherwise continue through
    step 4.
    ```

    ## Workflow

    ### Step 1 — Fetch and aggregate

    Run the aggregation script directly from the skill directory. Do
    **not** `cp` it anywhere first — the skill ConfigMap is the source of
    truth, and copies in `/data/workspace/` rot quickly as the script
    evolves.

    ```
    shell: python3 /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-fetch.py
    ```

    The script:
    - Writes `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md` for
      today — the primary input for step 2.
    - Writes `/data/workspace/memory/meetings-YYYY-MM-DD.md` as a
      duplicate for the exec-summary workflow.
    - Re-fetches the past 3 days and classifies any file whose content
      changed since the previous run into two flavors (see below).

    The script's stdout is your ground truth:

    - `Wrote N meetings to meetings-YYYY-MM-DD.md. [K failed to fetch.]
      [M still processing.] [G summaries flagged as possibly malformed.]
      [New since last run: ...]` — a single period-separated line. N is
      the count of completed recordings for today; the other fields only
      appear when they apply. If N is 0 AND the script did not also
      print a `CHANGED sources (late transcripts)` line, there is
      nothing to process — exit cleanly after this step. If G is
      non-zero, surface it in your final reply so Dan knows to manually
      re-summarize those recordings.
    - `CHANGED sources (late transcripts): meetings-YYYY-MM-DD.md, ...`
      — these are prior days whose transcripts were not yet available at
      the previous cron run (the previous file was the
      `No completed meeting recordings` placeholder) but have since
      landed. Their action items were NEVER captured by step 2.5. You
      must run step 2.5 on each of these files in addition to today's
      primary file. Prefix each Vikunja task description with
      `(late backfill from YYYY-MM-DD)` so Dan can tell real-time tasks
      from recovered ones.
    - `CHANGED sources (annotated): meetings-YYYY-MM-DD.md, ...` — these
      are prior days that already had real meeting content on the
      previous run and whose file content now differs. Treat as Dan's
      annotations. Re-distill in step 4 only; do NOT re-run step 2.5
      (original action items were already captured on the first pass).
    - Any warning about pending or failed recordings — surface in your
      final reply so Dan knows what state things are in. (The garbage
      summary count is part of the first line above; no separate
      output bullet.)

    ### Step 2 — Write the executive summary

    Step 2 only covers today's primary-date file. If step 1 reported zero
    meetings for today but named files in `CHANGED sources (late
    transcripts)`, skip step 2 entirely — do not write an exec summary
    for a prior date (Dan does not re-read yesterday's end-of-day
    recap). Jump straight to step 2.5 for the backfill files.

    Read the primary source file using its absolute path:

    ```
    file_read /data/workspace/wiki/sources/meetings-YYYY-MM-DD.md
    ```

    Write the exec summary to its absolute path:

    ```
    file_write /data/workspace/memory/meetings-exec-YYYY-MM-DD.md
    ```

    Use this exact template:

    ```markdown
    # Meetings — YYYY-MM-DD

    ## Action items for Dan
    - **<action>** — from **<meeting title>**. Context: <1-2 lines>. Due: <date or "no deadline given">.

    ## Action items others owe Dan
    - **<name>** owes **<action>** — from **<meeting title>**. Due: <date or "no deadline given">.

    ## Key decisions and issues
    - <one-line decision or issue> — from **<meeting title>**.

    ## Recording status
    - New recordings since last run: <titles, or "none">.
    - Recordings still processing: <titles, or "none">.
    ```

    If a section has no entries, write `- None today.` rather than
    omitting the section. Dan scans for these headers and an empty
    section is a signal; a missing section is a hole.

    ### Step 2.5 — Create Vikunja tasks

    Step 2.5 has three phases: **gather candidates** → **dedup against
    existing** → **create in one batch**. Keep them separate in your
    head — they run against the same pool of items and only differ in
    what they do with them.

    **The `vikunja-project-manager` skill has the full CLI reference
    and gotchas** — read it if you need the bigger picture. This step
    only specifies the meeting-specific pieces.

    #### Phase 1 — Gather candidates

    Start with every **concrete** action item in Dan's bucket from step
    2 (today's primary date). Skip vague items ("look into X", "think
    about Y") — Vikunja is for things with a verb, a noun, and ideally
    a deadline.

    Then add any file named in a `CHANGED sources (late transcripts)`
    line from step 1. Those meetings never went through step 2 / step
    2.5 on the previous cron run because the transcripts had not yet
    landed, so their action items are hiding. For those backfill files:

    - Extract action items directly from the per-meeting `## Action
      Items` sections of
      `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md` (there is
      no exec summary file to read — you do not write one for backfill
      days, see step 2).
    - Tag each as a backfill item so phase 3 can prefix the description
      correctly.
    - While reading a source file, if a recording's `### Summary` block
      starts with `*Warning: summary appears malformed`, drop that
      recording entirely — no Vikunja task, no wiki entry — and log the
      recording ID to surface to Dan at the end.

    Ignore any `CHANGED sources (annotated)` files here. Their original
    action items were already captured by step 2.5 on the day they
    first landed; the annotations themselves go into step 4 for wiki
    distillation, not into Vikunja.

    #### Phase 2 — Dedup against existing tasks

    Pull existing tasks as JSON so you can dedup against structured
    data instead of eyeballing text:

    ```
    shell: vikunja tasks 1 --format json
    ```

    **Filter the result on `done == false` first** — the CLI returns
    both open and completed tasks, and you do not want to skip creating
    a new task just because Dan completed an identically-named one last
    month.

    Do the dedup pass **once**, against the union of today's candidate
    items and any late-backfill candidate items from phase 1. Walk the
    filtered JSON and match each new item's title against every
    existing open task's `title`. If the titles are essentially the
    same, skip the new item. For close-but-not-identical matches (for
    example "Draft the X proposal" vs "Write proposal for X"), run
    `vikunja task show <id>` on the existing task to read its
    description and comments — if those already capture the new
    commitment, skip; otherwise keep it as a candidate.

    #### Phase 3 — Create in one batch

    Build a single JSON array with one object per surviving candidate,
    then hand it to `vikunja task batch-create` in one shot. Use
    **one** batch call for the whole review — same-day items and
    late-backfill items go in the same array. A typical review
    produces around 5 tasks, and collapsing ~5 create calls plus ~5
    label calls into one CLI invocation matters under cron load:
    every separate `shell:` call consumes a provider HTTP timeout
    window, and Sam has historically timed out mid-batch on Tier-0.5
    traffic when the calls stack up.

    Each task object should set:

    - `title`: the short action itself (verb + noun, no provenance —
      provenance lives in `description`).
    - `priority`: `4` if the meeting gave a deadline within the next 7
      days, otherwise `3`. Meeting action items have deadlines and
      provenance, so they shouldn't land at priority 0 next to generic
      backlog items.
    - `due`: `"YYYY-MM-DD"` when a deadline was given; omit otherwise.
    - `description`: `"From <meeting title>."` for same-day items, or
      `"(late backfill from YYYY-MM-DD) From <meeting title>."` for
      late-transcripts items. Keep the wording flat and do not wrap
      the meeting title in extra quotes — the CLI passes the string
      through JSON, not shell, so apostrophes and colons inside the
      title are already safe. Dan uses the description to trace every
      task back to its source.
    - `labels`: `["from-meeting"]`. The CLI auto-creates the label on
      first use and just attaches it thereafter — no separate
      `task label` call needed.

    Write the array to a workspace tmp file and pass it with `--file`.
    Passing multi-item JSON through `--stdin` heredocs works in a
    pinch but the shell-escaping is brittle when descriptions contain
    quotes or apostrophes; the file path avoids that entirely.

    ```
    file_write /data/.zeroclaw/workspace/tasks-YYYY-MM-DD.json
    ```

    with contents like:

    ```json
    [
      {
        "title": "Reschedule meetings around Minnesota travel",
        "priority": 4,
        "due": "2026-04-14",
        "description": "From Scrum of scrums.",
        "labels": ["from-meeting"]
      },
      {
        "title": "Draft agent interaction models doc",
        "priority": 3,
        "description": "(late backfill from 2026-04-08) From Caspar 1:1.",
        "labels": ["from-meeting"]
      }
    ]
    ```

    Then run the batch:

    ```
    shell: vikunja task batch-create 1 --assignee dan --file /data/.zeroclaw/workspace/tasks-YYYY-MM-DD.json
    ```

    Output is one `Task #<id> created: ...` line per item, followed by
    a trailing `Batch: C created, S skipped, F failed` summary. When
    F > 0 the command exits 1 — this is intentional so cron-level
    observability picks it up, but you should still continue into step
    3 and step 4 (Vikunja is a nice-to-have output, not the workflow's
    core contract) and surface the failed titles to Dan in your final
    reply.

    Leave the `tasks-YYYY-MM-DD.json` file in place after the batch
    call completes — do not `rm` it. It is a compact, human-readable
    record of exactly what Sam tried to create on that day and is the
    fastest answer when Dan later asks "what did you put in Vikunja
    yesterday?". Periodic cleanup of these files is out of scope for
    this skill.

    If you happen to have zero surviving candidates after phase 2,
    skip phase 3 entirely — do not run `batch-create` with an empty
    array and do not write the tmp file. There is nothing to do.

    ### Step 3 — Store the memory digest

    Short pointer, not content. The wiki is the durable store; memory is
    just a breadcrumb you can recall later:

    ```
    memory_store key=meetings_digest_YYYY-MM-DD category=daily value="N meetings. Files: /data/workspace/wiki/sources/meetings-YYYY-MM-DD.md, /data/workspace/memory/meetings-exec-YYYY-MM-DD.md. Theme: <one sentence>."
    ```

    ### Step 4 — Wiki distillation

    The raw source files in `/data/workspace/wiki/sources/` are the
    immutable data layer. Step 4 turns them into durable wiki pages for
    people, projects, and decisions.

    **Delegate the page format to the `wiki-management` skill** — that's
    where the directory structure, page template, and cross-reference
    rules live. This step only tells you *which* files to distill.

    Distill:

    1. Today's file: `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md`
       — always.
    2. Any file named in a `CHANGED sources (late transcripts)` line
       from step 1 — these are prior days whose meetings are being seen
       here for the first time.
    3. Any file named in a `CHANGED sources (annotated)` line from step
       1 — Dan has added notes that may contain new decisions, context,
       or reinterpretations.

    For each file, follow the `wiki-management` skill's Ingest operation:

    - **Entities** (`/data/workspace/wiki/entities/`): people who
      committed to an action item, or projects mentioned for the first
      time.
    - **Concepts** (`/data/workspace/wiki/concepts/`): key decisions,
      technical choices, or patterns that came up.
    - **Syntheses** (`/data/workspace/wiki/syntheses/`): only when a
      meeting links multiple existing entities in a new way.

    Be conservative. Not every meeting deserves a new wiki page. If the
    content is routine status updates with no new commitments or
    decisions, finish step 4 after reading the source file and exit
    without writing anything. Writing a trivial page is worse than
    writing none — it dilutes the wiki.

    Update `/data/workspace/wiki/index.md` and append to
    `/data/workspace/wiki/log.md` for anything you create or materially
    change.

    ## On-demand usage

    When Dan asks about a specific day's meetings outside the cron:

    1. `memory_recall key=meetings_digest_YYYY-MM-DD` for a quick
       pointer.
    2. `file_read /data/workspace/memory/meetings-exec-YYYY-MM-DD.md` for
       the summary.
    3. `file_read /data/workspace/wiki/sources/meetings-YYYY-MM-DD.md`
       for the full per-meeting detail.
    4. If the files don't exist for that date, run
       `shell: python3 /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-fetch.py YYYY-MM-DD`
       then rerun steps 2–3.

    ## Full transcript lookup

    When Dan asks about specific transcript content (quotes, exact
    wording):

    ```
    shell: python3 /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-transcript.py RECORDING_ID
    ```

    The script writes to
    `/data/workspace/memory/transcript-RECORDING_ID.md`.

    1. `file_read /data/workspace/memory/transcript-RECORDING_ID.md` with
       `limit=10` to read the header for metadata.
    2. Use `content_search` over
       `/data/workspace/memory/transcript-RECORDING_ID.md` to find
       relevant sections, then `file_read` with explicit offset/limit —
       never load a full transcript into a single tool call, they
       routinely run tens of thousands of tokens.
    3. `shell: rm /data/workspace/memory/transcript-RECORDING_ID.md` when
       you're done. These are large and ephemeral.

    ## API reference

    Base: `meetings.coffee-anon.com`. Auth: `Bearer $SPEAKR_API_TOKEN`.
    Query: `/api/recordings?q=date:today` or
    `date:yesterday`, `date:YYYY-MM-DD`, `date:thisweek`,
    `date_from:X&date_to:Y`. Add `per_page=100` to avoid pagination.

    ## Failure modes

    - `SPEAKR_API_TOKEN` missing → the script raises `KeyError` before
      any API call. This means `shell_env_passthrough` dropped the
      token. Surface to Dan and stop.
    - Speakr HTTP 5xx or connection error → retry the script once; if it
      fails again, surface to Dan and stop.
    - Script prints `Wrote 0 meetings` AND no `CHANGED sources (late
      transcripts)` line → exit cleanly after step 1. Not an error; Dan
      simply had no meetings that day and nothing recovered from
      previous days either. If a late-transcripts line IS present you
      still have work to do — skip today's exec summary but run step
      2.5 on the named backfill files.
    - Vikunja CLI error on a specific task → log the title, continue
      with the rest of step 2.5. Do not block step 3 or step 4.
    - `vikunja task create --assignee dan` prints
      `Warning: could not assign @dan ...` on stderr but still exits 0 →
      the task was created without an assignee. Vikunja's user-search
      endpoint rejects API tokens; the CLI falls back to the
      current-user endpoint, so in practice this only fires if the
      token's owning user is renamed or the token is ever rotated to a
      different account. Log the title and move on; do not retry.
    - Primary file contains one or more `Warning: summary appears
      malformed` banners → skip those specific recordings in step 2.5
      (no Vikunja tasks) and step 4 (no wiki pages). Surface the count
      to Dan in your final reply with the recording IDs so he can
      manually trigger a re-summarize in Speakr's UI.
    - `file_read` returns "not found" on the source file → you almost
      certainly used a relative path. Re-read the "Why paths are always
      absolute" section and retry with the full `/data/workspace/...`
      path.
    - Provider calls start failing mid-turn with
      `error sending request for url` and exponential retry backoff →
      your context has grown too big for the backend to finish within
      the provider's HTTP timeout. Re-read the "Context hygiene" section
      above: you are probably re-reading the same meeting file multiple
      times in one turn. Stop, use the content you already have, and
      finish the summary from memory rather than fetching again.

  speakr-fetch.py: |
    #!/usr/bin/env python3
    """Fetch and aggregate daily meeting recordings from Speakr.

    Usage: python3 speakr-fetch.py [YYYY-MM-DD] [--lookback N]
    Defaults to today. --lookback N also re-fetches the past N days
    to detect updated annotations (default: 3).

    Writes to both wiki/sources/ (primary, immutable-ish raw layer)
    and memory/ (backward compat for exec summary workflow).
    Reports which source files changed so Sam can re-distill them.
    """
    import json, os, urllib.request, datetime, pathlib, sys

    BASE = 'https://meetings.coffee-anon.com'
    TOKEN = os.environ['SPEAKR_API_TOKEN']
    WIKI_SOURCES = '/data/workspace/wiki/sources'
    MEM = '/data/workspace/memory'
    DROP = {'transcription','transcription_text','summary_html','notes_html',
            'audio_available','audio_deleted_at','can_delete','can_edit',
            'deletion_exempt','file_size','mime_type','original_filename',
            'processing_time_seconds','transcription_duration_seconds',
            'is_highlighted','is_inbox','is_owner','is_shared','has_group_tags',
            'user_id','completed_at','created_at'}

    # Parse args
    dates_to_fetch = []
    lookback = 3
    args = sys.argv[1:]
    i = 0
    while i < len(args):
        if args[i] == '--lookback' and i + 1 < len(args):
            lookback = int(args[i + 1])
            i += 2
        else:
            dates_to_fetch.append(args[i])
            i += 1

    today = datetime.date.today()
    if not dates_to_fetch:
        dates_to_fetch.append(today.isoformat())

    # Add lookback days
    for d in range(1, lookback + 1):
        past = (today - datetime.timedelta(days=d)).isoformat()
        if past not in dates_to_fetch:
            dates_to_fetch.append(past)

    def api(path):
        r = urllib.request.Request(f'{BASE}{path}',
            headers={'Authorization': f'Bearer {TOKEN}'})
        return json.loads(urllib.request.urlopen(r).read())

    def read_existing(path):
        """Return the file's text contents, or None if it doesn't exist."""
        if not path.exists():
            return None
        return path.read_text()

    def classify_change(old_text, new_text):
        """Classify how a meeting file's content changed between two runs.

        Returns one of:
          ''                — unchanged
          'late-transcripts' — prior file was the 'no completed recordings'
                              placeholder (or missing) and the new file has
                              real meeting headers. These need Step 2.5
                              because action items were NOT captured by the
                              previous cron run.
          'annotated'        — prior file already had real meeting headers
                              and the content differs. Treat as Dan's notes;
                              re-distill into the wiki in Step 4 but do not
                              re-run Step 2.5 (action items were captured
                              on the original pass).
        """
        if old_text == new_text:
            return ''
        old_has_meetings = bool(old_text and '\n## ' in old_text)
        new_has_meetings = '\n## ' in new_text
        if not old_has_meetings and new_has_meetings:
            return 'late-transcripts'
        return 'annotated'

    def extract_time(meeting_date):
        """Pull HH:MM from a Speakr meeting_date string.

        Speakr has shipped both 'YYYY-MM-DDTHH:MM:SS' and
        'YYYY-MM-DD HH:MM:SS' shapes over the years, so we don't hardcode
        offsets — we split on T or space and take the first five chars of
        the time half.
        """
        if not meeting_date:
            return ''
        if 'T' in meeting_date:
            parts = meeting_date.split('T', 1)
        elif ' ' in meeting_date:
            parts = meeting_date.split(' ', 1)
        else:
            return ''
        if len(parts) != 2:
            return ''
        return parts[1][:5]

    def looks_like_garbage_summary(text):
        """Heuristic detection of LLM-hallucinated summary output.

        Triggers on two patterns we have observed on real Speakr recordings
        when the upstream summarization model failed:
          - high ratio of CJK / Hangul / other exotic codepoints in what
            should be English text
          - the literal word 'placeholder' repeated several times
        Both correlate with garbage that must not flow into Vikunja tasks
        or wiki distillation.
        """
        if not text:
            return False
        n = len(text)
        if n < 80:
            return False
        exotic = sum(1 for c in text if ord(c) > 0x2E80)
        if exotic / n > 0.08:
            return True
        if text.lower().count('placeholder') > 3:
            return True
        return False

    def fetch_date(target_date):
        """Fetch recordings for a date, write files, return a dict of counts."""
        wiki_out = pathlib.Path(f'{WIKI_SOURCES}/meetings-{target_date}.md')
        mem_out = pathlib.Path(f'{MEM}/meetings-{target_date}.md')
        old_text = read_existing(wiki_out)

        # Track titles from prior run for new-since-last detection
        previous_titles = set()
        if mem_out.exists():
            for line in mem_out.read_text().splitlines():
                if line.startswith('## '):
                    previous_titles.add(line[3:].strip())

        is_today = target_date == today.isoformat()
        date_query = 'date:today' if is_today else f'date:{target_date}'
        data = api(f'/api/recordings?q={date_query}&per_page=100')
        recs = [r for r in data.get('recordings', []) if r.get('status') == 'COMPLETED']

        if not recs:
            if is_today:
                content = f'# Meetings — {target_date}\n\nNo completed meeting recordings for today.\n'
                wiki_out.write_text(content)
                mem_out.write_text(content)
            return {
                'ok': 0, 'failed': 0, 'pending': 0, 'garbage': 0,
                'new': [], 'change_kind': classify_change(old_text, read_existing(wiki_out) or ''),
            }

        ok = 0
        failed = 0
        pending_summaries = 0
        garbage_count = 0
        new_since_last = []
        lines = [f'# Meetings — {target_date}\n\n']

        for idx, rec_stub in enumerate(recs):
            rid = rec_stub['id']
            title = rec_stub.get('title', 'Untitled')
            try:
                rec = api(f'/api/recordings/{rid}')
                for k in DROP:
                    rec.pop(k, None)
            except Exception as e:
                lines.append(f'## {title}\n')
                lines.append(f'*Failed to fetch recording {rid}: {e}*\n\n---\n\n')
                failed += 1
                continue

            title = rec.get('title', title)
            participants = rec.get('participants', 'Unknown')
            time_str = extract_time(rec.get('meeting_date', ''))
            tags = ', '.join(t.get('name','') for t in rec.get('tags', []))
            summary = rec.get('summary', '')
            notes = rec.get('notes', '')
            events = rec.get('events', [])

            if title not in previous_titles and previous_titles:
                new_since_last.append(title)

            lines.append(f'## {title}\n')
            lines.append(f'**Participants:** {participants}\n')
            lines.append(f'**Time:** {time_str}\n')
            if tags:
                lines.append(f'**Tags:** {tags}\n')
            lines.append(f'**Transcript:** {BASE}/recording/{rid}\n\n')

            if summary:
                if looks_like_garbage_summary(summary):
                    lines.append(
                        '### Summary\n'
                        '*Warning: summary appears malformed — upstream LLM '
                        'likely hallucinated. Skip this recording for wiki '
                        'distillation and Vikunja task creation; consider '
                        'triggering a manual re-summarize in Speakr. '
                        'Original output below for reference.*\n\n'
                    )
                    lines.append(f'{summary}\n\n')
                    garbage_count += 1
                else:
                    lines.append(f'### Summary\n{summary}\n\n')
            else:
                lines.append('### Summary\n*Summary pending — recording may still be processing.*\n\n')
                pending_summaries += 1

            if events:
                lines.append('### Action Items & Events\n')
                for ev in events:
                    ev_title = ev.get('title', 'Untitled')
                    ev_date = ev.get('start_datetime', '')
                    ev_attendees = ', '.join(ev.get('attendees', []))
                    ev_desc = ev.get('description', '')
                    line = f'- **{ev_title}**'
                    if ev_attendees:
                        line += f' ({ev_attendees})'
                    if ev_date:
                        line += f' — {ev_date}'
                    if ev_desc:
                        line += f': {ev_desc}'
                    lines.append(line + '\n')
                lines.append('\n')

            if notes:
                lines.append(f'### Notes\n{notes}\n\n')

            lines.append('---\n\n')
            ok += 1

        content = ''.join(lines)
        wiki_out.parent.mkdir(parents=True, exist_ok=True)
        wiki_out.write_text(content)
        mem_out.parent.mkdir(parents=True, exist_ok=True)
        mem_out.write_text(content)

        return {
            'ok': ok,
            'failed': failed,
            'pending': pending_summaries,
            'garbage': garbage_count,
            'new': new_since_last,
            'change_kind': classify_change(old_text, content),
        }

    # Fetch all dates. For non-primary (lookback) dates, we split change
    # reports into two flavors so Sam can treat them differently:
    #   - late transcripts: the previous run wrote an empty placeholder
    #     and the transcripts have since landed. Step 2.5 must run on
    #     these or action items get silently lost.
    #   - annotated: Dan edited an already-populated file. Step 4 should
    #     re-distill, Step 2.5 should NOT run (originals were already
    #     captured on the first pass).
    late_transcripts = []
    annotated = []
    for target_date in dates_to_fetch:
        result = fetch_date(target_date)
        is_primary = target_date == dates_to_fetch[0]

        if is_primary:
            parts = [f'Wrote {result["ok"]} meetings to meetings-{target_date}.md']
            if result['failed']:
                parts.append(f'{result["failed"]} failed to fetch')
            if result['pending']:
                parts.append(f'{result["pending"]} still processing')
            if result['garbage']:
                parts.append(f'{result["garbage"]} summaries flagged as possibly malformed')
            if result['new']:
                parts.append(f'New since last run: {", ".join(result["new"])}')
            print('. '.join(parts))
            continue

        if result['change_kind'] == 'late-transcripts':
            late_transcripts.append(f'meetings-{target_date}.md')
        elif result['change_kind'] == 'annotated':
            annotated.append(f'meetings-{target_date}.md')

    if late_transcripts:
        print(f'CHANGED sources (late transcripts): {", ".join(late_transcripts)}')
        print('Run Step 2.5 on these files — action items were NOT captured by the previous cron.')
    if annotated:
        print(f'CHANGED sources (annotated): {", ".join(annotated)}')
        print('Re-distill in Step 4 only — Dan added notes to already-processed meetings.')

