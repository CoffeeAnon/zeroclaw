    ---
    name: k8s-delegation
    description: >
      Delegate K8s work to Walter (the cluster-side agent) via ACP. Use for
      deploys, manifest edits, scrapyard-applications PRs, follow-ups on
      Walter's PRs, and any multi-step cluster change. Skip for read-only
      observation Sam can answer alone, or for repo work that doesn't touch
      the cluster.
    always: false
    ---

    # K8s Delegation to Walter

    Walter is the K8s infrastructure agent. He has kubectl, the scrapyard-applications repo, and Serena memories. He has no access to your memory or conversation history.

    ## Core Rule

    One work order = one deployable unit. Do not combine multiple steps.

    ## Work Order Format

    Every acp-client send message must follow this structure:
    TASK: one sentence describing what to do.
    NAMESPACE: target namespace.
    CONTEXT: what exists already, repo location, patterns to follow.
    REQUIREMENTS: specific requirements as a list.
    VERIFICATION: what to check when done (pod status, commit paths, service endpoints).
    REPO PATH: path in scrapyard-applications repo.

    ## Deployment Sequence

    Send each step as a separate work order. Verify before proceeding to the next.
    1. Namespace with istio labels.
    2. Secrets (VaultStaticSecret CRDs, if needed).
    3. Storage (PVCs, if needed).
    4. Database (CNPG PostgreSQL, if needed).
    5. Application (Deployment + Service).
    6. External access (Certificate + Gateway + VirtualService). Walter submits a PR for these. Wait for Dan to merge before testing.
    7. Final verification.
    Skip steps that do not apply.

    ## After Each Work Order

    acp-client wait ID --timeout 600. Read response for concrete evidence (resource names, statuses, commits). If failed, send follow-up with error context. If successful, proceed. Clean up with acp-client delete ID.

    ## Monitoring

    acp-client progress ID to check status. acp-client inject ID "message" to course-correct mid-task.

    ## Walter's PRs

    When Walter submits a PR: note the PR number, tell Dan with the URL and what to do after merging. Do not send follow-up tasks that depend on PR'd resources until Dan confirms merge.

    ## PR Review Feedback

    When Dan requests changes on Walter's PR: send Walter a task with the PR number, tell him to read comments with gitea-pr comments N, make changes, push, and reply.

    ## Do Not

    Send multi-step plans as one message. Reference prior context Walter does not have. Skip verification between steps. Let Walter run 20+ minutes without checking progress.
  vikunja-project-manager.md: |
    ---
    name: vikunja-project-manager
    description: Manage project status, tasks, priorities, labels, and ordering via the vikunja CLI. Use this whenever Dan mentions todo lists, task tracking, project status, prioritizing, reordering, removing duplicates, backlogs, roadmaps, what's on his plate, what to work on next, or wants to record or report progress on work items — even if he doesn't explicitly name Vikunja.
    ---

    # Vikunja Project Manager

    You have a `vikunja` CLI tool that manages projects, tasks, labels, and
    ordering on the team's Vikunja instance (todolist.coffee-anon.com). Use it
    to track work status, create actionable task lists, and report progress.

    ## Not for this

    - **Sam's own task tracking** — use `task-tracking` (project #3 via
      `vikunja my-task ...`). This skill is for general project work,
      not Sam's inbox.
    - **Meeting action items** — `daily-meeting-summary` step 3 owns
      the batch-create flow into project #1.
    - **GitHub issues / PRs** — different system entirely; use `gh`.

    When `task-tracking` Q0 fires on an inbound reply (state
    update on an existing task), the CLI it reaches for —
    `vikunja task comment` and `vikunja task update` — is
    documented below in the Command reference and Gotchas.

    ## Discovering usage

    Every command supports `--help`. When you are unsure, run it:

    ```
    vikunja help                     # Top-level command list
    vikunja help task create         # Detailed help for a specific command
    vikunja task label --help        # Same, via --help on the subcommand
    ```

    ## Command reference

    ```
    vikunja projects
    vikunja project create --title "..."

    vikunja tasks <project-id> [--sort position|priority|due] [--format text|json]
    vikunja tasks reorder <project-id> --order "id1,id2,id3"

    vikunja task create <project-id> --title "..." [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee user]
    vikunja task update <task-id>   [--done] [--title "..."] [--description "..."] [--due "..."] [--priority 1-5] [--assignee user]
    vikunja task show   <task-id>
    vikunja task delete <task-id>
    vikunja task assign <task-id> --user <username>
    vikunja task comment <task-id> --body "..."

    vikunja task label <task-id> --list
    vikunja task label <task-id> --add "name" [--create-missing] [--color ff0000]
    vikunja task label <task-id> --remove "name"

    vikunja labels [--search "..."]
    vikunja label create --title "..." [--color "ff0000"] [--description "..."]
    ```

    ## Two ways to signal priority

    Vikunja has two independent priority signals. Use them together:

    1. **Native priority integer (1-5)** — stored on the task itself, used by
       `--sort priority`. Set it with `vikunja task update <id> --priority 5`.
       This is the field the UI sorts and color-codes by default.
    2. **Labels** — free-form colored tags. Useful for named priorities
       ("urgent", "blocked", "waiting") that should be visible at a glance
       in the list view. Attach with `vikunja task label <id> --add "urgent"`.

    When Dan asks you to "prioritize" a list, set both the integer priority
    AND an appropriate label so the signal is visible in every view.

    ## Workflow: prioritize an existing project

    1. `vikunja tasks <project-id>` — read the current list.
    2. Decide the priority order in your head.
    3. For each task, `vikunja task update <id> --priority N` (1=lowest, 5=highest).
    4. Optionally attach labels: `vikunja task label <id> --add "urgent" --create-missing --color ff0000`.
    5. Rewrite the display order in one call:
       `vikunja tasks reorder <project-id> --order "id-of-top,id-of-next,..."`.
    6. Verify with `vikunja tasks <project-id> --sort priority`.

    ## Workflow: remove duplicates

    1. `vikunja tasks <project-id> --format json` — get machine-readable task data.
    2. Scan the JSON for tasks with the same or near-identical `title`.
    3. For borderline cases, `vikunja task show <id>` on each candidate to
       compare descriptions, comments, labels, and assignees. The one with
       more context is usually the one to keep.
    4. For each duplicate, pick the one to keep (usually the oldest by `id`
       or the one with more context after inspection).
    5. For each duplicate to remove, `vikunja task delete <id>`.
    6. Verify with `vikunja tasks <project-id>`.

    ## Workflow: starting a new initiative

    1. `vikunja project create --title "Initiative Name"`
    2. Create tasks in priority order:
       `vikunja task create <id> --title "..." --priority 4`
    3. Reorder if you created them out of sequence:
       `vikunja tasks reorder <id> --order "..."`
    4. Report the project ID and task list to Dan.

    ## Gotchas

    - **`task update` zeroes fields you don't pass.** Vikunja's update
      endpoint is last-write-wins, not a partial patch. If you run
      `task update <id> --description "..."` on a task with priority 5,
      the priority becomes 0. Always pass `--priority N` when updating
      a task that already has a priority, even if you're only changing
      something else. When in doubt, `task show <id>` first to see what's
      already set.
    - **`--sort priority` is display-only.** It re-renders the list output
      but doesn't change the stored order. Use `tasks reorder` when you
      want the new order to persist in the UI.
    - **`tasks reorder` resequences the whole view, not just the IDs you
      pass.** Tasks you don't mention still get new positions (in their
      current display order, after the explicit block). If someone already
      manually arranged the tail of the list, that manual order is
      overwritten — so don't run `tasks reorder` unless you're committing
      to a full resequence.

    ## Style

    - `task show` is your detail view — use it whenever a list line isn't enough.
    - `--format json` is the right tool for programmatic reasoning; the
      default text format is for quick human-facing status reports.
    - Keep task titles short and actionable ("Deploy vikunja postgres",
      not "We need to set up the database").
