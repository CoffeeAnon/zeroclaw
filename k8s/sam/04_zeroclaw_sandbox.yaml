# trunk-ignore(checkov/CKV_K8S_8): zeroclaw gateway does not document a dedicated liveness endpoint
# trunk-ignore(checkov/CKV_K8S_9): zeroclaw gateway does not document a dedicated readiness endpoint
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: zeroclaw
  namespace: ai-agents
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        app: zeroclaw
    spec:
      serviceAccountName: zeroclaw-sa
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
      initContainers:
        - name: init-zeroclaw-config
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/.zeroclaw /data/.zeroclaw/workspace
              # Always sync config.toml from ConfigMap template.
              # Secrets are injected via env vars, not in the config file.
              echo "Syncing config.toml from ConfigMap template"
              cp /etc/zeroclaw-template/config.toml /data/.zeroclaw/config.toml
              chmod 600 /data/.zeroclaw/config.toml
              # Read-only identity files are mounted directly into the zeroclaw
              # container. Writable files (MEMORY.md, USER.md) are seeded to
              # the PVC only if missing, so Sam can update them.
              for f in MEMORY.md USER.md; do
                if [ ! -f "/data/.zeroclaw/workspace/$f" ] && [ -f "/etc/zeroclaw-template/identity/$f" ]; then
                  echo "Seeding writable $f"
                  cp "/etc/zeroclaw-template/identity/$f" "/data/.zeroclaw/workspace/$f"
                fi
              done
              # Skills are mounted directly into the zeroclaw container via subPath.
              # Create the skills directory so ZeroClaw can discover them.
              mkdir -p /data/.zeroclaw/workspace/skills/k8s-delegation
              mkdir -p /data/.zeroclaw/workspace/skills/vikunja-project-manager
              mkdir -p /data/.zeroclaw/workspace/skills/daily-meeting-summary
              mkdir -p /data/.zeroclaw/workspace/skills/science-curator
              mkdir -p /data/.zeroclaw/workspace/skills/browser-navigation
              mkdir -p /data/.zeroclaw/workspace/skills/cron-management
              mkdir -p /data/.zeroclaw/workspace/skills/wiki-management
              mkdir -p /data/.zeroclaw/workspace/skills/task-tracking
              mkdir -p /data/.zeroclaw/workspace/skills/team-coordination
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /data
            - name: zeroclaw-config-template
              mountPath: /etc/zeroclaw-template/config.toml
              subPath: config.toml
              readOnly: true
            - name: zeroclaw-identity
              mountPath: /etc/zeroclaw-template/identity
              readOnly: true
            # Skills are mounted directly into the zeroclaw container, not here.
      containers:
        - name: zeroclaw
          image: gitea.coffee-anon.com/dan/zeroclaw-sam:v1.6.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -ec
            - |
              mkdir -p /data/.zeroclaw /data/workspace /tmp/agent-browser
              cd /data/workspace
              # Pre-start the agent-browser daemon so it's warm when zeroclaw
              # needs it. Redirect stdin from /dev/null so process.stdin.resume()
              # inside the daemon doesn't trigger SIGTTIN when run in background.
              node /opt/sam-tools/npm-global/lib/node_modules/agent-browser/dist/daemon.js </dev/null &
              # Wait up to 180s for the socket to appear before starting zeroclaw.
              echo "Waiting for agent-browser daemon socket..."
              for _i in $(seq 1 180); do
                [ -S /tmp/agent-browser/default.sock ] && echo "Daemon ready." && break
                sleep 1
              done
              [ -S /tmp/agent-browser/default.sock ] || echo "Warning: daemon socket not ready, starting zeroclaw anyway"
              # Warm up Chromium before accepting agent work. The daemon socket
              # appearing does not mean Chromium can actually launch — the first
              # Playwright launch sometimes crashes silently, causing every
              # subsequent browser tool call to time out until the CLI restarts
              # the daemon. Running a warm-up page here ensures Chromium is
              # stable before zeroclaw starts serving requests.
              if [ -S /tmp/agent-browser/default.sock ]; then
                echo "Warming up Chromium..."
                for _i in 1 2 3; do
                  if agent-browser open "https://example.com" --json 2>/dev/null | grep -q '"success":true'; then
                    echo "Chromium warm-up complete."
                    break
                  fi
                  echo "Chromium warm-up attempt $_i failed, retrying..."
                  sleep 3
                done
              fi
              exec zeroclaw daemon
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOME
              value: /data
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-config-secrets
                  key: api_key
            - name: ZEROCLAW_GATEWAY_PAIRED_TOKENS
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-config-secrets
                  key: gateway-paired-tokens
                  optional: true
            - name: AGENT_BROWSER_SOCKET_DIR
              value: /tmp/agent-browser
            - name: AGENT_BROWSER_ARGS
              value: "--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage"
            - name: PLAYWRIGHT_BROWSERS_PATH
              value: /opt/sam-tools/home/.cache/ms-playwright
            - name: SPEAKR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-config-secrets
                  key: SPEAKR_API_TOKEN
                  optional: true
            - name: VIKUNJA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-config-secrets
                  key: VIKUNJA_API_TOKEN
                  optional: true
            - name: VIKUNJA_BASE_URL
              value: "http://vikunja.todolist.svc.cluster.local:3456"
            - name: VIKUNJA_SAM_PROJECT_ID
              value: "3"
            - name: VIKUNJA_TEAM_PROJECT_ID
              value: "7"
            - name: ACP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-k8s-agent-secrets
                  key: gateway-paired-tokens
                  optional: true
            # ── A2A wake/resume layer (feature=a2a) ──
            - name: ZEROCLAW_A2A_DB_URL
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-a2a-sam
                  key: a2a_db_url
                  optional: true
            - name: ZEROCLAW_A2A_SCHEMA
              value: "sam"
            - name: ZEROCLAW_A2A_AGENT_ROLE
              value: "sam"
            - name: ZEROCLAW_A2A_BIND_ADDR
              value: "0.0.0.0:3001"
            - name: ZEROCLAW_A2A_PUBLIC_BASE_URL
              value: "http://zeroclaw.ai-agents.svc.cluster.local:3001"
            - name: ZEROCLAW_USE_A2A_DELEGATION
              value: "false"   # toggled in Phase 2
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /data
            - name: acp-client
              mountPath: /usr/local/bin/acp-client
              subPath: acp-client.py
              readOnly: true
            - name: vikunja-tool
              mountPath: /usr/local/bin/vikunja
              subPath: vikunja.py
              readOnly: true
            # Identity files mounted directly from ConfigMap.
            - name: zeroclaw-identity
              mountPath: /data/.zeroclaw/workspace/AGENTS.md
              subPath: AGENTS.md
              readOnly: true
            - name: zeroclaw-identity
              mountPath: /data/.zeroclaw/workspace/TOOLS.md
              subPath: TOOLS.md
              readOnly: true
            - name: zeroclaw-identity
              mountPath: /data/.zeroclaw/workspace/IDENTITY.md
              subPath: IDENTITY.md
              readOnly: true
            - name: zeroclaw-identity
              mountPath: /data/.zeroclaw/workspace/SOUL.md
              subPath: SOUL.md
              readOnly: true
            # Skills mounted directly — no init container copy needed.
            - name: zeroclaw-skills
              mountPath: /data/.zeroclaw/workspace/skills/k8s-delegation/SKILL.md
              subPath: k8s-delegation.md
              readOnly: true
            - name: zeroclaw-skills
              mountPath: /data/.zeroclaw/workspace/skills/vikunja-project-manager/SKILL.md
              subPath: vikunja-project-manager.md
              readOnly: true
            - name: skill-meeting-summary
              mountPath: /data/.zeroclaw/workspace/skills/daily-meeting-summary/SKILL.md
              subPath: daily-meeting-summary.md
              readOnly: true
            - name: skill-meeting-summary
              mountPath: /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-fetch.py
              subPath: speakr-fetch.py
              readOnly: true
            - name: skill-meeting-summary
              mountPath: /data/.zeroclaw/workspace/skills/daily-meeting-summary/speakr-transcript.py
              subPath: speakr-transcript.py
              readOnly: true
            - name: skill-science-curator
              mountPath: /data/.zeroclaw/workspace/skills/science-curator/SKILL.md
              subPath: science-curator.md
              readOnly: true
            - name: skill-science-curator
              mountPath: /data/.zeroclaw/workspace/skills/science-curator/collect-candidates.py
              subPath: collect-candidates.py
              readOnly: true
            - name: skill-browser-navigation
              mountPath: /data/.zeroclaw/workspace/skills/browser-navigation/SKILL.md
              subPath: browser-navigation.md
              readOnly: true
            - name: skill-cron-management
              mountPath: /data/.zeroclaw/workspace/skills/cron-management/SKILL.md
              subPath: cron-management.md
              readOnly: true
            - name: skill-wiki-management
              mountPath: /data/.zeroclaw/workspace/skills/wiki-management/SKILL.md
              subPath: wiki-management.md
              readOnly: true
            - name: skill-task-tracking
              mountPath: /data/.zeroclaw/workspace/skills/task-tracking/SKILL.md
              subPath: task-tracking.md
              readOnly: true
            - name: skill-team-coordination
              mountPath: /data/.zeroclaw/workspace/skills/team-coordination/SKILL.md
              subPath: team-coordination.md
              readOnly: true
        - name: signal-api-adapter
          image: citizendaniel/signal-api-adapter:v1.3.0
          imagePullPolicy: Always
          ports:
            - name: signal-adapt
              containerPort: 8686
              protocol: TCP
          env:
            - name: BRIDGE_BASE_URL
              value: http://signal-cli-daemon.ai-agents.svc.cluster.local:8686
            - name: LISTEN_ADDR
              value: :8686
            - name: POLL_TIMEOUT_SECONDS
              value: "20"
            - name: SIGNAL_ACCOUNT
              value: "+19038905805"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: zeroclaw-config-template
          configMap:
            name: zeroclaw-config
        - name: zeroclaw-identity
          configMap:
            name: zeroclaw-identity
        - name: zeroclaw-skills
          configMap:
            name: zeroclaw-skills
        - name: skill-meeting-summary
          configMap:
            name: zeroclaw-skill-meeting-summary
            items:
              - key: daily-meeting-summary.md
                path: daily-meeting-summary.md
              - key: speakr-fetch.py
                path: speakr-fetch.py
                mode: 0755
              - key: speakr-transcript.py
                path: speakr-transcript.py
                mode: 0755
        - name: skill-science-curator
          configMap:
            name: zeroclaw-skill-science-curator
            items:
              - key: science-curator.md
                path: science-curator.md
              - key: collect-candidates.py
                path: collect-candidates.py
                mode: 0755
        - name: skill-browser-navigation
          configMap:
            name: zeroclaw-skill-browser-navigation
        - name: skill-cron-management
          configMap:
            name: zeroclaw-skill-cron-management
        - name: skill-wiki-management
          configMap:
            name: zeroclaw-skill-wiki-management
        - name: skill-task-tracking
          configMap:
            name: zeroclaw-skill-task-tracking
        - name: skill-team-coordination
          configMap:
            name: zeroclaw-skill-team-coordination
        - name: acp-client
          configMap:
            name: acp-client
            defaultMode: 0755
        - name: vikunja-tool
          configMap:
            name: zeroclaw-vikunja-tool
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: zeroclaw-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: 10Gi
