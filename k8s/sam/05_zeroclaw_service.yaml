apiVersion: v1
kind: Service
metadata:
  name: zeroclaw
  namespace: ai-agents
  labels:
    app: zeroclaw
spec:
  selector:
    app: zeroclaw
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: a2a
      port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
