    # Task Tracking

    Durable work state lives in Vikunja project #3 (Sam's inbox).
    Use it INSTEAD OF `memory_store` for anything Dan asks you to
    do. `memory_store` has no lifecycle — a resolved instruction
    there keeps scoring high on relevance and surfacing as a
    phantom pending task (see 2026-04-16 isolation-leak incident).
    Vikunja tasks have `done: true|false`, timestamps, and are
    Dan-inspectable, so resolved work looks resolved.

    ## First decision on every inbound Signal message

    Ask: **is this a task?** (Dan asking you to produce something,
    even if you deliver the result by reply.)

    **YES** → `vikunja my-task create ...` BEFORE doing any work:

    - Audits, investigations, reviews, summaries, reports
    - Imperatives with a concrete outcome ("please X", "rename Y",
      "add Z to the wiki", "schedule a meeting with W")
    - "Please proceed" on a previously-proposed plan — the plan IS
      the task; create one now for the execution phase
    - Multi-step work requiring more than a lookup
    - Replies that will contain a list, a table, or more than
      ~3 sentences
    - Anything with a deadline or "by X" clause

    **NO** → just reply, no task:

    - Single-fact lookup ("what time is it", "are you alive",
      "what python version", "how's ceph")
    - Ack / emoji / meta ("thanks", "got it", "👍", "how are you")
    - Status ping ("are you there?", "did X work?", "still running?")
    - Chat about yourself or tools

    When in doubt, create the task. Over-tracking costs one CLI
    call; under-tracking loses durable context.

    ## Workflow

    **Step 1 — Create BEFORE doing the work:**

    ```
    vikunja my-task create "<short title>" \
      --description "<Dan's ask verbatim + any relevant context>"
    ```

    Capture the returned task ID. Optionally mention it in your
    final reply: "Tracking as #N."

    **Step 2 — Do the work.**

    **Step 3 — Close BEFORE the final Signal reply:**

    ```
    vikunja my-task done <id> \
      --comment "<what you produced — IDs, paths, outputs, findings>"
    ```

    **Step 4 — Reply to Dan with the result.**

    Two CLI calls per task. Keep the comment short — Dan opens
    Vikunja for detail, not his chat replies.

    ## Worked example

    User: *"Audit your crons for delivery config gaps."*

    ```
    $ vikunja my-task create "Audit crons for delivery gaps" \
        --description "Check every cron's delivery.mode and channel/to config"
    Task #42 created: Audit crons for delivery gaps

    # ... run cron_list, inspect each, summarize ...

    $ vikunja my-task done 42 \
        --comment "Found 3 with mode=none: speakr-daily-summary, wiki-lint, self-reflection-check. Two correctly configured: science-curator, vikunja-task-review."
    Task #42 updated [DONE]
    ```

    Reply to Dan: *"Audited your crons (tracked as #42). Three
    have mode=none: speakr-daily-summary, wiki-lint, and
    self-reflection-check. Two are correctly configured with
    Signal delivery. Want me to wire delivery on any of them?"*

    ## Session start

    Before responding to the first message of a new session:

    ```
    vikunja my-tasks --open
    ```

    If items are open: check whether the current message relates
    to an existing one (update, don't duplicate). Nudge Dan about
    anything stuck.

    ## Long-running tasks

    Use `vikunja my-task note <id> "<what changed>"` between
    milestones. Sparingly — one note per meaningful step, not one
    per tool call.

    ## CLI reference

    ```
    vikunja my-tasks [--open] [--format text|json]
    vikunja my-task create "<title>" [--description ...] [--priority 1-5] [--due YYYY-MM-DD]
    vikunja my-task show   <id>
    vikunja my-task done   <id> [--comment "..."]
    vikunja my-task note   <id> "<progress>"
    ```

    Project ID is baked in via `VIKUNJA_SAM_PROJECT_ID`; the `my-*`
    commands never need you to pass it.

    ## Failure modes

    - Create returns non-zero → surface the error to Dan, proceed
      without task tracking for that ask. Don't retry silently.
    - Cancellation mid-flight → `my-task done <id> --comment
      "cancelled — reason"`. Cleaner than delete.
    - You notice a stale `memory_store` entry that SHOULD have been
      a task → leave it; its score will decay. Don't backfill old
      instructions into Vikunja.
