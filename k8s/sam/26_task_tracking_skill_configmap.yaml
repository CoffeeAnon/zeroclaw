    ---
    name: task-tracking
    version: 1.4.0
    description: >
      Durable task tracking in Vikunja. Sam's inbox (project #3) for
      work Sam can produce end-to-end; Dan's inbox (project #1) for
      asks needing Dan's tools/time, or that Dan routed to his list
      explicitly. Always resident — consult on every inbound Signal
      message before doing work.
    always: true
    ---

    # Task Tracking

    Durable task state lives in Vikunja, never in `memory_store`.
    `memory_store` has no lifecycle — a resolved instruction there
    keeps scoring high on relevance and surfacing as a phantom
    pending task (see 2026-04-16 isolation-leak incident). Vikunja
    tasks have `done: true|false`, timestamps, and are
    Dan-inspectable, so resolved work looks resolved.

    Two projects matter:

    - **#3 (Sam's inbox)** — work Sam owns end-to-end and will
      deliver to Dan via reply.
    - **#1 (Dan's inbox)** — asks that need Dan to act, or that
      Dan routed to his own list.

    A task in the wrong project is worse than no task: Dan has to
    clean it up, and items routed to Sam's inbox that she can't
    actually close just sit there.

    ## First decision on every inbound Signal message

    Two questions, in order. Q1 decides whether to track at all;
    Q2 decides where.

    ### Q1 — Is this a task?

    A "task" = Dan asking you to produce or arrange something, even
    if the deliverable is just your reply.

    **YES** → continue to Q2:

    - Audits, investigations, reviews, summaries, reports
    - Imperatives with a concrete outcome ("please X", "rename Y",
      "add Z to the wiki", "schedule a meeting with W")
    - "Please proceed" on a previously-proposed plan — the plan IS
      the task; create one now for the execution phase
    - Multi-step work requiring more than a lookup
    - Replies that will contain a list, a table, or more than
      ~3 sentences
    - Anything with a deadline or "by X" clause

    **NO** → just reply, no task:

    - Single-fact lookup ("what time is it", "are you alive",
      "what python version", "how's ceph")
    - Ack / emoji / meta ("thanks", "got it", "👍", "how are you")
    - Status ping ("are you there?", "did X work?", "still running?")
    - Chat about yourself or tools

    When Q1 is in doubt, treat as YES and continue to Q2.

    ### Q2 — Whose task is it?

    **Sam's** → `vikunja my-task create "<title>" ...` (project 3).
    Use when:

    - You can produce the deliverable end-to-end (audit, review,
      summary, code/k8s op, wiki edit, report, lookup with analysis)
    - Dan will get the result by reply, or you'll close out with a
      comment on the task

    **Dan's** → `vikunja task create 1 --title "<title>" ...`
    (project 1). Use when ANY of these are true:

    - The action needs a tool or access Sam doesn't have — booking
      appointments, phone calls, signing things, paying, in-person
      logistics, anything off-cluster
    - Dan named the destination explicitly — "on my todo list",
      "my task list", "put it on my list", "remind me to", "not
      yours", "for me to do"
    - Dan asked you to track for him, not do for him — "I should…
      remind me", "don't let me forget", "queue this up for me"

    If Sam's-vs-Dan's is ambiguous (could go either way), ask in
    the reply rather than guessing — one clarifying question is
    cheaper than a misroute and a cleanup. Default to Dan's-task
    only when there's at least one concrete signal above.

    ## When this skill does NOT apply

    This skill is resident because Sam was losing track of ad-hoc
    Signal asks (see 2026-04-16 isolation-leak incident). That's
    its job. It is NOT the right tool when another skill owns the
    routing for a specific workflow:

    - **Inside a cron session** whose name starts with `speakr-` or
      contains `meeting-summary` — `daily-meeting-summary` step 3
      owns Vikunja routing for that run. Action items go to project
      1 (Dan's inbox) via `vikunja task batch-create 1`, not to
      Sam's inbox. Skip the first-decision gate entirely; the skill
      that loaded for the cron already knows what to do.
    - **Inside the `daily-meeting-summary` skill body** at any
      time — its step 3 is the authoritative Vikunja path for
      meeting action items. Do not layer `my-task create` on top.
    - **Inside the `team-coordination` delegation flow** — the
      parent `my-task` for Dan's ask is still yours to open, but
      the code/k8s delegation itself routes via `team-task create`
      in project 7. Don't double-book the same work.

    The general rule: if a more specific skill owns the destination
    project for a piece of work, let it win. Over-tracking in your
    own inbox is no longer cheap when the work belongs somewhere
    else — a task in the wrong project is worse than no task,
    because Dan then has to clean up.

    ## Workflow — Sam's task (project 3)

    **Step 1 — Create BEFORE doing the work:**

    ```
    vikunja my-task create "<short title>" \
      --description "<Dan's ask verbatim + any relevant context>"
    ```

    Capture the returned task ID. Optionally mention it in your
    final reply: "Tracking as #N."

    **Step 2 — Do the work.**

    **Step 3 — Close BEFORE the final Signal reply:**

    ```
    vikunja my-task done <id> \
      --comment "<what you produced — IDs, paths, outputs, findings>"
    ```

    **Step 4 — Reply to Dan with the result.**

    Two CLI calls per task. Keep the comment short — Dan opens
    Vikunja for detail, not his chat replies.

    ## Workflow — Dan's task (project 1)

    Sam doesn't do the work and doesn't close the task — Dan does.
    One CLI call, then reply confirming what landed where.

    ```
    vikunja task create 1 --title "<short title>" \
      --description "<Dan's ask verbatim + any relevant context>" \
      [--due YYYY-MM-DD] [--priority 1-5]
    ```

    Reply: *"Added to your todo list (#N): <title>."* Don't promise
    to follow up — it's Dan's now.

    ## Worked example

    User: *"Audit your crons for delivery config gaps."*

    ```
    $ vikunja my-task create "Audit crons for delivery gaps" \
        --description "Check every cron's delivery.mode and channel/to config"
    Task #42 created: Audit crons for delivery gaps

    # ... run cron_list, inspect each, summarize ...

    $ vikunja my-task done 42 \
        --comment "Found 3 with mode=none: speakr-daily-summary, wiki-lint, self-reflection-check. Two correctly configured: science-curator, vikunja-task-review."
    Task #42 updated [DONE]
    ```

    Reply to Dan: *"Audited your crons (tracked as #42). Three
    have mode=none: speakr-daily-summary, wiki-lint, and
    self-reflection-check. Two are correctly configured with
    Signal delivery. Want me to wire delivery on any of them?"*

    ## Session start

    Before responding to the first message of a new session:

    ```
    vikunja my-tasks --open
    ```

    If items are open: check whether the current message relates
    to an existing one (update, don't duplicate). Nudge Dan about
    anything stuck.

    ## Long-running tasks

    Use `vikunja my-task note <id> "<what changed>"` between
    milestones. Sparingly — one note per meaningful step, not one
    per tool call.

    ## CLI reference

    Sam's inbox (project 3 — baked in via `VIKUNJA_SAM_PROJECT_ID`):

    ```
    vikunja my-tasks [--open] [--format text|json]
    vikunja my-task create "<title>" [--description ...] [--priority 1-5] [--due YYYY-MM-DD]
    vikunja my-task show   <id>
    vikunja my-task done   <id> [--comment "..."]
    vikunja my-task note   <id> "<progress>"
    ```

    Dan's inbox (project 1 — pass project-id explicitly):

    ```
    vikunja task create 1 --title "<title>" [--description ...] [--due YYYY-MM-DD] [--priority 1-5]
    vikunja tasks 1 [--sort position|priority|due] [--format text|json]
    ```

    Sam does not close tasks in project 1 on Dan's behalf. If Dan
    asks Sam to mark something done there, Sam can — but the
    default is hands-off.

    ## Failure modes

    - Create returns non-zero → surface the error to Dan, proceed
      without task tracking for that ask. Don't retry silently.
    - Cancellation mid-flight → `my-task done <id> --comment
      "cancelled — reason"`. Cleaner than delete.
    - You notice a stale `memory_store` entry that SHOULD have been
      a task → leave it; its score will decay. Don't backfill old
      instructions into Vikunja.
