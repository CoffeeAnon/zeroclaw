apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: zeroclaw-a2a-sam
  namespace: ai-agents
spec:
  vaultAuthRef: zeroclaw-static-auth
  mount: kvv2
  type: kv-v2
  path: zeroclaw/a2a
  refreshAfter: 60s
  destination:
    name: zeroclaw-a2a-sam
    create: true
    transformation:
      templates:
        a2a_db_url:
          text: |
            postgres://sam_rw:{{ .Secrets.sam_password }}@zeroclaw-a2a-rw.ai-agents.svc.cluster.local:5432/a2a
