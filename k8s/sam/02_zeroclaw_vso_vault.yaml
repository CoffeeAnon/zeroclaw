apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeroclaw-vault-sa
  namespace: zeroclaw-test

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: zeroclaw-static-auth
  namespace: zeroclaw-test
spec:
  method: kubernetes
  mount: scrapyard
  kubernetes:
    role: zeroclaw-all
    serviceAccount: zeroclaw-vault-sa
    audiences:
      - vault

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: zeroclaw-config-secret
  namespace: zeroclaw-test
spec:
  vaultAuthRef: zeroclaw-static-auth
  mount: kvv2
  type: kv-v2
  path: zeroclaw/zeroclaw-config
  refreshAfter: 30s
  destination:
    name: zeroclaw-config-secrets
    create: true
