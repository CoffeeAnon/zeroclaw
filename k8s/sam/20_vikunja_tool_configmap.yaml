    def print_command_help(command_path):
        """Print help for a specific command path (e.g., 'task create')."""
        text = COMMAND_HELP.get(command_path)
        if text:
            print(text)
        else:
            print(f"No help available for: {command_path}\n")
            print(__doc__)


    def _check_help(args, command_path):
        """If args requests help, print command help and exit 0.

        Matches either the literal 'help' as the first positional arg, or
        '--help'/'-h' anywhere. Not matching bare 'help' mid-arg-list avoids
        false positives when a user passes 'help' as a flag value, e.g.
        `task create --title help`.
        """
        if args and args[0] == "help":
            print_command_help(command_path)
            sys.exit(0)
        for a in args:
            if a in ("--help", "-h"):
                print_command_help(command_path)
                sys.exit(0)


    def sam_project_id():
        """Return the configured project ID for Sam's inbox, or exit with a
        descriptive error if it is missing or not numeric."""
        try:
            return int(SAM_PROJECT_ID)
        except (TypeError, ValueError):
            print(
                f"ERROR: VIKUNJA_SAM_PROJECT_ID must be an integer "
                f"(got: {SAM_PROJECT_ID!r}). Set it in the pod env block.",
                file=sys.stderr,
            )
            sys.exit(2)


    def team_project_id():
        """Return the configured project ID for the Sam-Walter shared board,
        or exit with a descriptive error if it is missing or not numeric."""
        if not TEAM_PROJECT_ID:
            print(
                "ERROR: VIKUNJA_TEAM_PROJECT_ID is not set. The team-* "
                "commands require a shared project ID; set it in the pod "
                "env block (e.g. 7 for 'Sam & Walter ops').",
                file=sys.stderr,
            )
            sys.exit(2)
        try:
            return int(TEAM_PROJECT_ID)
        except (TypeError, ValueError):
            print(
                f"ERROR: VIKUNJA_TEAM_PROJECT_ID must be an integer "
                f"(got: {TEAM_PROJECT_ID!r}).",
                file=sys.stderr,
            )
            sys.exit(2)


    def cmd_projects(args):
        """List all projects."""
        _check_help(args, "projects")
        projects = _api("GET", "/projects")
        if not projects:
            print("No projects found.")
            return
        for p in projects:
            pid = p.get("id", "?")
            title = p.get("title", "Untitled")
            desc = p.get("description", "")
            desc_preview = f" — {desc[:60]}" if desc else ""
            print(f"  #{pid}: {title}{desc_preview}")


    def cmd_project_create(args):
        """Create a new project."""
        _check_help(args, "project create")
        flags, _ = _parse_args(args, {"title": "str", "description": "str"})
        title = flags.get("title")
        if not title:
            print('Usage: vikunja project create --title "..." [--description "..."]', file=sys.stderr)
            sys.exit(1)
        data = {"title": title}
        if "description" in flags:
            data["description"] = flags["description"]
        result = _api("PUT", "/projects", data)
        print(f"Project #{result.get('id', '?')} created: {result.get('title', title)}")


    def _print_task_line(t):
        """Render one task as a single-line list entry."""
        tid = t.get("id", "?")
        title = t.get("title", "Untitled")
        done = "DONE" if t.get("done") else "TODO"
        due = t.get("due_date", "")
        due_str = f" (due: {due[:10]})" if due and due != "0001-01-01T00:00:00Z" else ""
        priority = t.get("priority", 0)
        pri_str = f" [P{priority}]" if priority else ""
        labels = t.get("labels") or []
        label_str = (" {" + ",".join(l.get("title", "?") for l in labels) + "}") if labels else ""
        assignees = t.get("assignees") or []
        assign_str = f" @{','.join(a.get('username','?') for a in assignees)}" if assignees else ""
        print(f"  #{tid} [{done}]{pri_str} {title}{due_str}{label_str}{assign_str}")

    def cmd_tasks(args):
        """List tasks in a project."""
        _check_help(args, "tasks")
        flags, positional = _parse_args(args, {"sort": "str", "format": "str", "open": "bool"})
        if not positional:
            print_command_help("tasks")
            sys.exit(1)
        project_id = positional[0]
        view_id = _get_list_view_id(project_id)
        task_list = _api("GET", f"/projects/{project_id}/views/{view_id}/tasks")
        if not task_list:
            print(f"No tasks in project #{project_id}.")
            return

        sort_by = flags.get("sort", "position")
        if sort_by == "priority":
            # Highest priority first; tasks with no priority (0) sink to the bottom.
            task_list.sort(key=lambda t: -(t.get("priority") or 0))
        elif sort_by == "due":
            # Earliest due first; tasks with no due date sink to the bottom.
            def _due_key(t):
                d = t.get("due_date") or ""
                if not d or d == "0001-01-01T00:00:00Z":
                    return "9999-99-99"
                return d
            task_list.sort(key=_due_key)
        # "position" is the native order returned by the API; no-op.

        if flags.get("open"):
            task_list = [t for t in task_list if not t.get("done")]

        if flags.get("format") == "json":
            print(json.dumps(task_list, indent=2))
            return

        for t in task_list:
            _print_task_line(t)


    def cmd_my_tasks(args):
        """List tasks in Sam's inbox. Thin wrapper over cmd_tasks that
        injects the project ID so Sam never has to remember it.
        """
        _check_help(args, "my-tasks")
        flags, _ = _parse_args(args, {"sort": "str", "format": "str", "open": "bool"})
        delegate_args = [str(sam_project_id())]
        delegate_args += ["--sort", flags.get("sort", "position")]
        delegate_args += ["--format", flags.get("format", "text")]
        if flags.get("open"):
            delegate_args.append("--open")
        return cmd_tasks(delegate_args)


    def cmd_my_task(args):
        """Dispatcher for `vikunja my-task <sub> ...`. Subs:
          create <title> [--description ...] [--priority N] [--due YYYY-MM-DD]
          show   <id>
          done   <id> [--comment ...]
          note   <id> <comment>
        Delegates to existing cmd_task_create / cmd_task_show /
        cmd_task_update / cmd_task_comment with Sam's project pre-filled.
        """
        if not args or args[0] in ("help", "--help", "-h"):
            print_command_help("my-task")
            sys.exit(0)
        sub = args[0]
        rest = args[1:]

        if sub == "create":
            flags, positional = _parse_args(rest, {
                "description": "str", "priority": "str", "due": "str",
            })
            if not positional:
                print(
                    'Usage: vikunja my-task create "<title>" '
                    '[--description ...] [--priority 1-5] [--due YYYY-MM-DD]',
                    file=sys.stderr,
                )
                sys.exit(2)
            title = positional[0]
            delegate_args = [str(sam_project_id()), "--title", title]
            if "description" in flags:
                delegate_args += ["--description", flags["description"]]
            if "priority" in flags:
                delegate_args += ["--priority", flags["priority"]]
            if "due" in flags:
                delegate_args += ["--due", flags["due"]]
            return cmd_task_create(delegate_args)

        if sub == "show":
            _, positional = _parse_args(rest, {})
            if not positional:
                print("Usage: vikunja my-task show <id>", file=sys.stderr)
                sys.exit(2)
            return cmd_task_show([positional[0]])

        if sub == "done":
            flags, positional = _parse_args(rest, {"comment": "str"})
            if not positional:
                print("Usage: vikunja my-task done <id> [--comment \"...\"]", file=sys.stderr)
                sys.exit(2)
            task_id = positional[0]
            # cmd_task_update calls sys.exit(1) on API failure, so if we reach
            # the comment call the update succeeded. Keep these in sequence —
            # do not refactor cmd_task_update to return an error code without
            # also adding an explicit success check here.
            rc = cmd_task_update([task_id, "--done"])
            if "comment" in flags:
                cmd_task_comment([task_id, "--body", flags["comment"]])
            return rc

        if sub == "note":
            flags, positional = _parse_args(rest, {})
            if len(positional) < 2:
                print("Usage: vikunja my-task note <id> \"<comment>\"", file=sys.stderr)
                sys.exit(2)
            task_id = positional[0]
            # Join remaining positionals so unquoted multi-word comments still work
            # instead of silently truncating to the first token.
            body = " ".join(positional[1:])
            return cmd_task_comment([task_id, "--body", body])

        print(
            "Usage: vikunja my-task {create|show|done|note} <args>",
            file=sys.stderr,
        )
        sys.exit(2)


