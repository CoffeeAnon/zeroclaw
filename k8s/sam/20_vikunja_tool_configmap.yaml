apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-vikunja-tool
  namespace: ai-agents
data:
  vikunja.py: |
    #!/usr/bin/env python3
    """Vikunja CLI for Sam (ZeroClaw Agent).

    Manages projects and tasks on the Vikunja instance at todolist.coffee-anon.com
    for project status tracking and coordination.

    Commands:
      vikunja projects                        List all projects
      vikunja project create --title "..."    Create a project
      vikunja tasks <project-id>              List tasks in a project
      vikunja task create <project-id> --title "..." [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]
      vikunja task update <task-id> [--done] [--title "..."] [--description "..."] [--assignee <username>]
      vikunja task assign <task-id> --user <username>
      vikunja task comment <task-id> --body "..."
      vikunja help

    Environment:
      VIKUNJA_API_TOKEN  — JWT token for the sam user (required)
      VIKUNJA_BASE_URL   — Vikunja URL (default: http://vikunja.todolist.svc.cluster.local:3456)
    """
    import json
    import os
    import sys
    import urllib.request
    import urllib.error

    BASE_URL = os.environ.get("VIKUNJA_BASE_URL", "http://vikunja.todolist.svc.cluster.local:3456")
    API_URL = f"{BASE_URL}/api/v1"
    TOKEN = os.environ.get("VIKUNJA_API_TOKEN", "")


    def _api(method, path, data=None, timeout=15):
        """Make an authenticated Vikunja API request."""
        if not TOKEN:
            print("ERROR: VIKUNJA_API_TOKEN not set", file=sys.stderr)
            sys.exit(1)
        url = f"{API_URL}{path}"
        headers = {
            "Authorization": f"Bearer {TOKEN}",
            "Content-Type": "application/json",
        }
        body = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            resp = urllib.request.urlopen(req, timeout=timeout)
            raw = resp.read().decode()
            return json.loads(raw) if raw else {}
        except urllib.error.HTTPError as e:
            error_body = e.read().decode() if e.fp else ""
            print(f"ERROR: HTTP {e.code} — {e.reason}", file=sys.stderr)
            if error_body:
                try:
                    detail = json.loads(error_body)
                    print(f"Detail: {detail.get('message', error_body)}", file=sys.stderr)
                except json.JSONDecodeError:
                    print(f"Detail: {error_body[:500]}", file=sys.stderr)
            sys.exit(1)
        except urllib.error.URLError as e:
            print(f"ERROR: {e.reason}", file=sys.stderr)
            sys.exit(1)


    def _parse_args(args, flags):
        """Parse --flag value pairs from args list. Returns (parsed_dict, positional_list)."""
        parsed = {}
        positional = []
        i = 0
        while i < len(args):
            if args[i].startswith("--"):
                key = args[i][2:]
                if key in flags and flags[key] == "bool":
                    parsed[key] = True
                    i += 1
                elif key in flags and i + 1 < len(args):
                    parsed[key] = args[i + 1]
                    i += 2
                else:
                    print(f"Unknown or incomplete flag: {args[i]}", file=sys.stderr)
                    sys.exit(1)
            else:
                positional.append(args[i])
                i += 1
        return parsed, positional


    COMMAND_HELP = {
        "projects": (
            'Usage: vikunja projects\n'
            '\n'
            '  List all projects you have access to.\n'
        ),
        "project create": (
            'Usage: vikunja project create --title "..." [--description "..."]\n'
            '\n'
            '  Create a new project.\n'
        ),
        "tasks": (
            'Usage: vikunja tasks <project-id> [--sort position|priority|due] [--format text|json]\n'
            '\n'
            '  List tasks in a project.\n'
            '\n'
            'Flags:\n'
            '  --sort FIELD     position (default, respects manual reorder), priority (highest first), due (earliest first)\n'
            '  --format FORMAT  text (default) or json (machine-readable, full task records)\n'
        ),
        "tasks reorder": (
            'Usage: vikunja tasks reorder <project-id> --order "id1,id2,id3,..."\n'
            '\n'
            '  Resequence every task in a project so the IDs you pass appear\n'
            '  first, in the order you gave them, and any tasks you did NOT\n'
            '  mention keep their relative order but are placed after the\n'
            '  explicit block. Every task in the view gets a fresh position,\n'
            '  so the result is deterministic regardless of prior state.\n'
            '\n'
            '  All IDs in --order must belong to the project, must be unique,\n'
            '  and must be visible in the default list view.\n'
            '\n'
            'Example:\n'
            '  vikunja tasks reorder 4 --order "17,23,19,12"\n'
        ),
        "task create": (
            'Usage: vikunja task create <project-id> --title "..." \\\n'
            '         [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]\n'
            '\n'
            '  Create a new task in a project. --priority is the native integer\n'
            '  priority field (1=lowest, 5=highest). For visual priority labels\n'
            '  use `vikunja task label`.\n'
        ),
        "task update": (
            'Usage: vikunja task update <task-id> [--done] [--title "..."] \\\n'
            '         [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]\n'
            '\n'
            '  Update an existing task. Any omitted field is left unchanged.\n'
        ),
        "task show": (
            'Usage: vikunja task show <task-id>\n'
            '\n'
            '  Show full details for a task: title, description, priority,\n'
            '  labels, due date, assignees, and comments.\n'
        ),
        "task delete": (
            'Usage: vikunja task delete <task-id>\n'
            '\n'
            '  Delete a task permanently. Use this to remove duplicates.\n'
        ),
        "task assign": (
            'Usage: vikunja task assign <task-id> --user <username>\n'
            '\n'
            '  Assign a user to a task.\n'
        ),
        "task comment": (
            'Usage: vikunja task comment <task-id> --body "..."\n'
            '\n'
            '  Add a comment to a task.\n'
        ),
        "task label": (
            'Usage:\n'
            '  vikunja task label <task-id> --list\n'
            '  vikunja task label <task-id> --add "name" [--create-missing] [--color ff0000]\n'
            '  vikunja task label <task-id> --remove "name"\n'
            '\n'
            '  Manage labels on a task. Labels are looked up by name (exact match).\n'
            '  With --create-missing, a label that does not yet exist is created\n'
            '  automatically. --color is a 6-char hex code (no leading #).\n'
        ),
        "labels": (
            'Usage: vikunja labels [--search "..."]\n'
            '\n'
            '  List all labels you have access to. --search filters by name.\n'
        ),
        "label create": (
            'Usage: vikunja label create --title "..." [--color "ff0000"] [--description "..."]\n'
            '\n'
            '  Create a new label. --color is a 6-char hex code without the leading #.\n'
        ),
    }


    def print_command_help(command_path):
        """Print help for a specific command path (e.g., 'task create')."""
        text = COMMAND_HELP.get(command_path)
        if text:
            print(text)
        else:
            print(f"No help available for: {command_path}\n")
            print(__doc__)


    def _check_help(args, command_path):
        """If args requests help, print command help and exit 0.

        Matches either the literal 'help' as the first positional arg, or
        '--help'/'-h' anywhere. Not matching bare 'help' mid-arg-list avoids
        false positives when a user passes 'help' as a flag value, e.g.
        `task create --title help`.
        """
        if args and args[0] == "help":
            print_command_help(command_path)
            sys.exit(0)
        for a in args:
            if a in ("--help", "-h"):
                print_command_help(command_path)
                sys.exit(0)


    def cmd_projects(args):
        """List all projects."""
        _check_help(args, "projects")
        projects = _api("GET", "/projects")
        if not projects:
            print("No projects found.")
            return
        for p in projects:
            pid = p.get("id", "?")
            title = p.get("title", "Untitled")
            desc = p.get("description", "")
            desc_preview = f" — {desc[:60]}" if desc else ""
            print(f"  #{pid}: {title}{desc_preview}")


    def cmd_project_create(args):
        """Create a new project."""
        _check_help(args, "project create")
        flags, _ = _parse_args(args, {"title": "str", "description": "str"})
        title = flags.get("title")
        if not title:
            print('Usage: vikunja project create --title "..." [--description "..."]', file=sys.stderr)
            sys.exit(1)
        data = {"title": title}
        if "description" in flags:
            data["description"] = flags["description"]
        result = _api("PUT", "/projects", data)
        print(f"Project #{result.get('id', '?')} created: {result.get('title', title)}")


    def cmd_tasks(args):
        """List tasks in a project."""
        _check_help(args, "tasks")
        if not args:
            print("Usage: vikunja tasks <project-id>", file=sys.stderr)
            sys.exit(1)
        project_id = args[0]
        # Get the list view (first view) for this project
        views = _api("GET", f"/projects/{project_id}/views")
        if not views:
            print("No views found for this project.")
            return
        view_id = views[0].get("id")
        task_list = _api("GET", f"/projects/{project_id}/views/{view_id}/tasks")
        if not task_list:
            print(f"No tasks in project #{project_id}.")
            return
        for t in task_list:
            tid = t.get("id", "?")
            title = t.get("title", "Untitled")
            done = "DONE" if t.get("done") else "TODO"
            due = t.get("due_date", "")
            due_str = f" (due: {due[:10]})" if due and due != "0001-01-01T00:00:00Z" else ""
            priority = t.get("priority", 0)
            pri_str = f" [P{priority}]" if priority else ""
            assignees = t.get("assignees") or []
            assign_str = f" @{','.join(a.get('username','?') for a in assignees)}" if assignees else ""
            print(f"  #{tid} [{done}]{pri_str} {title}{due_str}{assign_str}")


    def _resolve_user_id(username):
        """Resolve a username to a numeric user ID via search."""
        results = _api("GET", f"/users?s={username}")
        for u in results:
            if u.get("username") == username:
                return u.get("id")
        print(f"ERROR: User '{username}' not found", file=sys.stderr)
        sys.exit(1)


    def _assign_user(task_id, username):
        """Assign a user to a task by username."""
        user_id = _resolve_user_id(username)
        _api("PUT", f"/tasks/{task_id}/assignees", {"user_id": user_id})
        print(f"  Assigned @{username} to task #{task_id}")


    def cmd_task_create(args):
        """Create a task in a project."""
        _check_help(args, "task create")
        flags, positional = _parse_args(args, {
            "title": "str", "description": "str", "due": "str",
            "priority": "str", "assignee": "str",
        })
        if not positional:
            print('Usage: vikunja task create <project-id> --title "..." [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]',
                  file=sys.stderr)
            sys.exit(1)
        project_id = positional[0]
        title = flags.get("title")
        if not title:
            print("ERROR: --title is required", file=sys.stderr)
            sys.exit(1)
        data = {"title": title, "project_id": int(project_id)}
        if "description" in flags:
            data["description"] = flags["description"]
        if "due" in flags:
            data["due_date"] = flags["due"] + "T00:00:00Z"
        if "priority" in flags:
            data["priority"] = int(flags["priority"])
        result = _api("PUT", f"/projects/{project_id}/tasks", data)
        task_id = result.get("id", "?")
        print(f"Task #{task_id} created: {result.get('title', title)}")
        if "assignee" in flags:
            _assign_user(task_id, flags["assignee"])


    def cmd_task_update(args):
        """Update a task."""
        _check_help(args, "task update")
        flags, positional = _parse_args(args, {
            "done": "bool", "title": "str", "description": "str",
            "due": "str", "priority": "str", "assignee": "str",
        })
        if not positional:
            print('Usage: vikunja task update <task-id> [--done] [--title "..."] [--description "..."] [--assignee <username>]',
                  file=sys.stderr)
            sys.exit(1)
        task_id = positional[0]
        assignee = flags.pop("assignee", None)
        data = {}
        if flags.get("done"):
            data["done"] = True
        if "title" in flags:
            data["title"] = flags["title"]
        if "description" in flags:
            data["description"] = flags["description"]
        if "due" in flags:
            data["due_date"] = flags["due"] + "T00:00:00Z"
        if "priority" in flags:
            data["priority"] = int(flags["priority"])
        if data:
            result = _api("POST", f"/tasks/{task_id}", data)
            status = "DONE" if result.get("done") else "TODO"
            print(f"Task #{task_id} updated [{status}]: {result.get('title', '?')}")
        if assignee:
            _assign_user(task_id, assignee)
        if not data and not assignee:
            print("Nothing to update. Use --done, --title, --description, --due, --priority, or --assignee.",
                  file=sys.stderr)
            sys.exit(1)


    def cmd_task_assign(args):
        """Assign a user to a task."""
        _check_help(args, "task assign")
        flags, positional = _parse_args(args, {"user": "str"})
        if not positional or "user" not in flags:
            print('Usage: vikunja task assign <task-id> --user <username>', file=sys.stderr)
            sys.exit(1)
        _assign_user(positional[0], flags["user"])


    def cmd_task_comment(args):
        """Add a comment to a task."""
        _check_help(args, "task comment")
        flags, positional = _parse_args(args, {"body": "str"})
        if not positional or "body" not in flags:
            print('Usage: vikunja task comment <task-id> --body "..."', file=sys.stderr)
            sys.exit(1)
        task_id = positional[0]
        result = _api("PUT", f"/tasks/{task_id}/comments", {"comment": flags["body"]})
        print(f"Comment added to task #{task_id} (comment id: {result.get('id', '?')})")


    def main():
        if len(sys.argv) < 2:
            print(__doc__)
            sys.exit(0)
        if sys.argv[1] in ("help", "--help", "-h"):
            # `vikunja help`              -> top-level
            # `vikunja help task create`  -> per-command
            if len(sys.argv) >= 3:
                print_command_help(" ".join(sys.argv[2:]))
            else:
                print(__doc__)
            sys.exit(0)

        cmd = sys.argv[1]
        rest = sys.argv[2:]

        if cmd == "projects":
            cmd_projects(rest)
        elif cmd == "project" and rest:
            if rest[0] in ("help", "--help", "-h"):
                print_command_help("project create")
                sys.exit(0)
            elif rest[0] == "create":
                cmd_project_create(rest[1:])
            else:
                print(f"Unknown project subcommand: {rest[0]}", file=sys.stderr)
                print(__doc__)
                sys.exit(1)
        elif cmd == "tasks":
            cmd_tasks(rest)
        elif cmd == "task" and rest:
            if rest[0] in ("help", "--help", "-h"):
                print(__doc__)
                sys.exit(0)
            subcmd = rest[0]
            if subcmd == "create":
                cmd_task_create(rest[1:])
            elif subcmd == "update":
                cmd_task_update(rest[1:])
            elif subcmd == "assign":
                cmd_task_assign(rest[1:])
            elif subcmd == "comment":
                cmd_task_comment(rest[1:])
            else:
                print(f"Unknown task subcommand: {subcmd}", file=sys.stderr)
                print(__doc__)
                sys.exit(1)
        else:
            print(f"Unknown command: {cmd}", file=sys.stderr)
            print(__doc__)
            sys.exit(1)


    if __name__ == "__main__":
        main()
