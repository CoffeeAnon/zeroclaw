apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-vikunja-tool
  namespace: ai-agents
data:
  vikunja.py: |
    #!/usr/bin/env python3
    """Vikunja CLI for Sam (ZeroClaw Agent).

    Manages projects, tasks, and labels on the Vikunja instance at
    todolist.coffee-anon.com for project status tracking and coordination.

    Commands:
      vikunja projects                              List all projects
      vikunja project create --title "..."          Create a project

      vikunja tasks <project-id> [--open] [--sort FIELD] [--format FORMAT]
                                                    List tasks in a project
      vikunja tasks reorder <project-id> --order "id1,id2,id3"
                                                    Resequence a project: listed IDs move to the
                                                    top in order, unlisted tasks follow in their
                                                    current order

      vikunja task create <project-id> --title "..." [--description ...] [--due YYYY-MM-DD] [--priority 1-5] [--assignee user]
      vikunja task batch-create <project-id> [--assignee user] (--stdin | --file PATH)
                                                    Create many tasks in one call. Reads a JSON
                                                    array from stdin or a file; each object may
                                                    specify title, description, priority, due,
                                                    labels, assignee. Labels are created on
                                                    demand and attached in-call, so no follow-up
                                                    task-label command is needed.
      vikunja task update <task-id> [--done] [--title ...] [--description ...] [--due ...] [--priority 1-5] [--assignee user]
      vikunja task show   <task-id>                 Full task detail (description, labels, assignees, comments)
      vikunja task delete <task-id>                 Delete a task (use for duplicates)
      vikunja task assign <task-id> --user <username>
      vikunja task comment <task-id> --body "..."

      vikunja task label <task-id> --list
      vikunja task label <task-id> --add "name" [--create-missing] [--color ff0000]
      vikunja task label <task-id> --remove "name"

      vikunja labels [--search "..."]               List all labels
      vikunja label create --title "..." [--color "ff0000"] [--description "..."]

      vikunja my-tasks [--open] [--sort position|priority|due] [--format text|json]
                                                    List tasks in Sam's inbox (default project #3)
      vikunja my-task create "<title>" [--description ...] [--priority 1-5] [--due YYYY-MM-DD]
      vikunja my-task show   <id>
      vikunja my-task done   <id> [--comment "..."]
      vikunja my-task note   <id> "<comment>"

      vikunja team-tasks [--open] [--sort position|priority|due] [--format text|json]
                                                    List tasks in the Sam-Walter shared project
      vikunja team-task create "<title>" [--description ...] [--priority 1-5] [--due YYYY-MM-DD]
      vikunja team-task show   <id>
      vikunja team-task done   <id> [--comment "..."]
      vikunja team-task note   <id> "<comment>"

      vikunja help                                  Top-level help
      vikunja help <command>                        Per-command help
      vikunja <command> --help                      Same (works on any subcommand)

    Environment:
      VIKUNJA_API_TOKEN         — JWT token for the sam user (required)
      VIKUNJA_BASE_URL          — Vikunja URL (default: http://vikunja.todolist.svc.cluster.local:3456)
      VIKUNJA_SAM_PROJECT_ID    — Project ID for Sam's inbox (default: 3)
      VIKUNJA_TEAM_PROJECT_ID   — Project ID for the Sam-Walter shared board (e.g. 7)
    """
    import json
    import os
    import sys
    import urllib.parse
    import urllib.request
    import urllib.error

    BASE_URL = os.environ.get("VIKUNJA_BASE_URL", "http://vikunja.todolist.svc.cluster.local:3456")
    API_URL = f"{BASE_URL}/api/v1"
    TOKEN = os.environ.get("VIKUNJA_API_TOKEN", "")
    SAM_PROJECT_ID = os.environ.get("VIKUNJA_SAM_PROJECT_ID", "3")
    TEAM_PROJECT_ID = os.environ.get("VIKUNJA_TEAM_PROJECT_ID", "")


    class VikunjaError(Exception):
        """Raised by _api when raise_on_error=True and the request fails.

        Lets callers of optional operations (for example, assignment after
        a successful task create) recover with a warning instead of aborting
        the whole CLI invocation with exit 1.
        """
        def __init__(self, code, message):
            self.code = code
            self.message = message
            super().__init__(f"HTTP {code}: {message}")


    def _api(method, path, data=None, timeout=15, raise_on_error=False):
        """Make an authenticated Vikunja API request.

        Default behavior prints HTTP errors to stderr and calls sys.exit(1),
        which is correct for primary commands. Pass raise_on_error=True to
        get a VikunjaError instead — use this for optional side operations
        that should not abort the primary command (for example, resolving a
        user for an assignment after a successful task create).
        """
        if not TOKEN:
            print("ERROR: VIKUNJA_API_TOKEN not set", file=sys.stderr)
            sys.exit(1)
        url = f"{API_URL}{path}"
        headers = {
            "Authorization": f"Bearer {TOKEN}",
            "Content-Type": "application/json",
        }
        body = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            resp = urllib.request.urlopen(req, timeout=timeout)
            raw = resp.read().decode()
            return json.loads(raw) if raw else {}
        except urllib.error.HTTPError as e:
            error_body = e.read().decode() if e.fp else ""
            detail = ""
            if error_body:
                try:
                    detail = json.loads(error_body).get("message", error_body)
                except json.JSONDecodeError:
                    detail = error_body[:500]
            if raise_on_error:
                raise VikunjaError(e.code, detail or e.reason)
            print(f"ERROR: HTTP {e.code} — {e.reason}", file=sys.stderr)
            if detail:
                print(f"Detail: {detail}", file=sys.stderr)
            sys.exit(1)
        except urllib.error.URLError as e:
            if raise_on_error:
                raise VikunjaError(0, str(e.reason))
            print(f"ERROR: {e.reason}", file=sys.stderr)
            sys.exit(1)


    def _parse_args(args, flags):
        """Parse --flag value pairs from args list. Returns (parsed_dict, positional_list)."""
        parsed = {}
        positional = []
        i = 0
        while i < len(args):
            if args[i].startswith("--"):
                key = args[i][2:]
                if key in flags and flags[key] == "bool":
                    parsed[key] = True
                    i += 1
                elif key in flags and i + 1 < len(args):
                    parsed[key] = args[i + 1]
                    i += 2
                else:
                    print(f"Unknown or incomplete flag: {args[i]}", file=sys.stderr)
                    sys.exit(1)
            else:
                positional.append(args[i])
                i += 1
        return parsed, positional


