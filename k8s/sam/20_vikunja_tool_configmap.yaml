    def _resolve_user_id(username):
        """Resolve a username to a numeric user ID.

        Tries the /user endpoint (current authenticated user) first because
        /users?s=<name> requires frontend JWT auth and returns 401 under an
        API token, while /user works with API tokens. In practice this Sam
        instance only ever assigns to the single human user that owns the
        token, so the /user path handles almost every call.

        Raises VikunjaError on failure so the caller can decide whether the
        whole command should abort.
        """
        me = _api("GET", "/user", raise_on_error=True)
        if me and me.get("username") == username:
            return me.get("id")
        results = _api(
            "GET",
            f"/users?s={urllib.parse.quote(username)}",
            raise_on_error=True,
        )
        for u in results or []:
            if u.get("username") == username:
                return u.get("id")
        raise VikunjaError(404, f"user '{username}' not found")


    def _assign_user(task_id, username):
        """Assign a user to a task by username. Raises VikunjaError on failure."""
        user_id = _resolve_user_id(username)
        _api(
            "PUT",
            f"/tasks/{task_id}/assignees",
            {"user_id": user_id},
            raise_on_error=True,
        )
        print(f"  Assigned @{username} to task #{task_id}")


    def _build_task_payload(project_id, title, description=None, due=None, priority=None):
        """Shared helper for constructing a Vikunja task create payload.

        Single source of truth for how CLI fields map to the Vikunja API
        body, so `task create` and `task batch-create` can't drift.
        """
        data = {"title": title, "project_id": int(project_id)}
        if description is not None:
            data["description"] = description
        if due is not None:
            data["due_date"] = due + "T00:00:00Z"
        if priority is not None:
            data["priority"] = int(priority)
        return data


    def _attach_label(task_id, name, create_missing=True, color=None):
        """Look up a label by name (optionally creating it) and attach to task.

        Returns the label dict on success. Raises VikunjaError on any failure
        so the caller can decide whether to continue or abort. Used by
        `task batch-create` to inline label attachment into the creation
        flow; the standalone `task label --add` path has its own slightly
        different semantics (needs `--create-missing` passed explicitly).
        """
        label = _find_label_by_name(name)
        if not label:
            if not create_missing:
                raise VikunjaError(404, f"label '{name}' not found")
            payload = {"title": name}
            if color:
                payload["hex_color"] = color.lstrip("#")
            label = _api("PUT", "/labels", payload, raise_on_error=True)
        _api(
            "PUT",
            f"/tasks/{task_id}/labels",
            {"label_id": label["id"]},
            raise_on_error=True,
        )
        return label


    def cmd_task_create(args):
        """Create a task in a project."""
        _check_help(args, "task create")
        flags, positional = _parse_args(args, {
            "title": "str", "description": "str", "due": "str",
            "priority": "str", "assignee": "str",
        })
        if not positional:
            print('Usage: vikunja task create <project-id> --title "..." [--description "..."] [--due "YYYY-MM-DD"] [--priority 1-5] [--assignee <username>]',
                  file=sys.stderr)
            sys.exit(1)
        project_id = positional[0]
        title = flags.get("title")
        if not title:
            print("ERROR: --title is required", file=sys.stderr)
            sys.exit(1)
        data = _build_task_payload(
            project_id,
            title,
            description=flags.get("description"),
            due=flags.get("due"),
            priority=flags.get("priority"),
        )
        result = _api("PUT", f"/projects/{project_id}/tasks", data)
        task_id = result.get("id", "?")
        print(f"Task #{task_id} created: {result.get('title', title)}")
        if "assignee" in flags:
            try:
                _assign_user(task_id, flags["assignee"])
            except VikunjaError as e:
                print(
                    f"  Warning: could not assign @{flags['assignee']} to "
                    f"task #{task_id} ({e}). Task was created without an "
                    f"assignee.",
                    file=sys.stderr,
                )


    def cmd_task_batch_create(args):
        """Create many tasks from a JSON array on stdin.

        Collapses what would otherwise be N `task create` calls plus N
        `task label` calls into a single CLI invocation. Sam's daily
        meeting review typically produces 4-5 tasks at once; shelling out
        up to 10 times round-trips through the runtime provider and each
        one eats a fresh HTTP timeout budget, which has historically
        caused cron-timeouts under Tier-0.5 load. One batch call is one
        timeout window.

        The dedup decision stays on the caller's side: this command does
        not look at existing tasks. Callers (for example the
        `daily-meeting-summary` skill's step 2.5) are expected to pull
        `vikunja tasks <project> --format json` first and filter.
        """
        _check_help(args, "task batch-create")
        flags, positional = _parse_args(args, {
            "assignee": "str", "stdin": "bool", "file": "str",
        })
        source_flags = [bool(flags.get("stdin")), "file" in flags]
        if not positional or sum(source_flags) != 1:
            print(
                'Usage: vikunja task batch-create <project-id> '
                '[--assignee <username>] (--stdin | --file PATH)',
                file=sys.stderr,
            )
            sys.exit(1)
        project_id = positional[0]
        try:
            int(project_id)
        except ValueError:
            print(f"ERROR: project-id must be an integer (got {project_id!r})",
                  file=sys.stderr)
            sys.exit(1)

        if "file" in flags:
            try:
                with open(flags["file"]) as f:
                    raw = f.read()
            except OSError as e:
                print(f"ERROR: could not read {flags['file']}: {e}",
                      file=sys.stderr)
                sys.exit(1)
        else:
            raw = sys.stdin.read()
        try:
            items = json.loads(raw)
        except json.JSONDecodeError as e:
            print(f"ERROR: stdin is not valid JSON: {e}", file=sys.stderr)
            sys.exit(1)
        if not isinstance(items, list):
            print("ERROR: stdin must be a JSON array of task objects",
                  file=sys.stderr)
            sys.exit(1)

        default_assignee = flags.get("assignee")
        created_count = 0
        skipped_count = 0
        failed_count = 0

        for idx, item in enumerate(items):
            if not isinstance(item, dict):
                print(
                    f"ERROR: item {idx}: expected object, got {type(item).__name__}",
                    file=sys.stderr,
                )
                failed_count += 1
                continue
            title = item.get("title")
            if not title:
                print(f"ERROR: item {idx}: missing required field 'title'",
                      file=sys.stderr)
                failed_count += 1
                continue

            payload = _build_task_payload(
                project_id,
                title,
                description=item.get("description"),
                due=item.get("due"),
                priority=item.get("priority"),
            )
            try:
                result = _api(
                    "PUT",
                    f"/projects/{project_id}/tasks",
                    payload,
                    raise_on_error=True,
                )
            except VikunjaError as e:
                print(f"ERROR: item {idx} ({title!r}): create failed ({e})",
                      file=sys.stderr)
                failed_count += 1
                continue

            task_id = result.get("id", "?")
            label_names = item.get("labels") or []
            attached_labels = []
            for label_name in label_names:
                try:
                    _attach_label(task_id, label_name, create_missing=True)
                    attached_labels.append(label_name)
                except VikunjaError as e:
                    print(
                        f"  Warning: task #{task_id}: could not attach label "
                        f"'{label_name}' ({e})",
                        file=sys.stderr,
                    )

            assignee = item.get("assignee", default_assignee)
            assigned_to = None
            if assignee:
                try:
                    _assign_user(task_id, assignee)
                    assigned_to = assignee
                except VikunjaError as e:
                    print(
                        f"  Warning: task #{task_id}: could not assign "
                        f"@{assignee} ({e}). Task was created without an "
                        f"assignee.",
                        file=sys.stderr,
                    )

            trailer_bits = []
            if attached_labels:
                trailer_bits.append(f"labels: {','.join(attached_labels)}")
            if assigned_to:
                trailer_bits.append(f"assigned: {assigned_to}")
            trailer = f" ({'; '.join(trailer_bits)})" if trailer_bits else ""
            print(f"Task #{task_id} created: {title}{trailer}")
            created_count += 1

        print(
            f"Batch: {created_count} created, {skipped_count} skipped, "
            f"{failed_count} failed"
        )
        if failed_count:
            sys.exit(1)


    def cmd_task_update(args):
        """Update a task."""
        _check_help(args, "task update")
        flags, positional = _parse_args(args, {
            "done": "bool", "title": "str", "description": "str",
            "due": "str", "priority": "str", "assignee": "str",
        })
        if not positional:
            print('Usage: vikunja task update <task-id> [--done] [--title "..."] [--description "..."] [--assignee <username>]',
                  file=sys.stderr)
            sys.exit(1)
        task_id = positional[0]
        assignee = flags.pop("assignee", None)
        data = {}
        if flags.get("done"):
            data["done"] = True
        if "title" in flags:
            data["title"] = flags["title"]
        if "description" in flags:
            data["description"] = flags["description"]
        if "due" in flags:
            data["due_date"] = flags["due"] + "T00:00:00Z"
        if "priority" in flags:
            data["priority"] = int(flags["priority"])
        if data:
            result = _api("POST", f"/tasks/{task_id}", data)
            status = "DONE" if result.get("done") else "TODO"
            print(f"Task #{task_id} updated [{status}]: {result.get('title', '?')}")
        if assignee:
            try:
                _assign_user(task_id, assignee)
            except VikunjaError as e:
                print(
                    f"  Warning: could not assign @{assignee} to task "
                    f"#{task_id} ({e}). Task was updated without "
                    f"reassignment.",
                    file=sys.stderr,
                )
        if not data and not assignee:
            print("Nothing to update. Use --done, --title, --description, --due, --priority, or --assignee.",
                  file=sys.stderr)
            sys.exit(1)


