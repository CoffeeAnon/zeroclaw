    # Wiki Management

    A persistent markdown knowledge base at `/data/workspace/wiki/`. The
    wiki is the **durable** store; `memory_store` is for transient
    session facts only. Anything worth keeping across sessions, pod
    restarts, or agent turns goes in the wiki.

    **Tools:** `file_read`, `file_write`, `file_edit`, `glob_search`,
    `content_search`, `memory_store`, `memory_recall`, `cron_add`,
    `send_user_message`, `shell`.

    ## Runtime rules

    - **Absolute paths only** for every wiki operation. Your cwd is
      `/data/.zeroclaw/workspace/`; the wiki lives at
      `/data/workspace/wiki/`. Relative paths silently resolve wrong.
    - **Do not re-read a page you already read this turn.** Tool
      results stay in context. Re-reading doubles tokens per request
      and triggers provider HTTP timeouts mid-turn. If you need a slice
      after a `file_edit`, use `file_read` with `offset`/`limit`.
    - Rationale, full bootstrap content, page-template example, and
      extended failure modes live in
      `docs/sam-skills/wiki-management-design.md` (repo-side, not
      runtime-loaded).

    ## Directory structure

    ```
    /data/workspace/wiki/
      index.md      — catalog of pages with one-line summaries
      log.md        — append-only operations log
      sources/      — immutable raw documents (never modify after saving)
      entities/     — people, projects, systems, services, vendors
      concepts/     — technologies, decisions, design patterns, topics
      syntheses/    — cross-cutting analyses
    ```

    ## Bootstrap (idempotent — safe on every deployment)

    ```
    shell: mkdir -p /data/workspace/wiki/sources /data/workspace/wiki/entities /data/workspace/wiki/concepts /data/workspace/wiki/syntheses
    ```

    Then check `index.md` and `log.md`. If either is **missing or
    0 bytes** (known pre-v2.0 state), seed from the *Bootstrap
    templates* section of `docs/sam-skills/wiki-management-design.md`
    before any other wiki operation.

    ## Operations

    ### Ingest

    When Dan shares a document, URL, meeting summary, or knowledge worth
    keeping:

    1. **Save the raw source.** Use
       `/data/workspace/wiki/sources/YYYY-MM-DD-slug.md`. For meetings,
       `daily-meeting-summary` already writes
       `/data/workspace/wiki/sources/meetings-YYYY-MM-DD.md` — don't
       duplicate it. Sources are immutable; never modify after saving.

    2. **Identify entities and concepts.** Read the source and list:
       - People who committed or projects first mentioned → **entities**
       - Technical choices / decisions / design patterns → **concepts**
       - Sources linking multiple existing pages in a new way → **synthesis**
         (rare — default to updating existing pages instead)

    3. **Check whether each page exists.**

       ```
       glob_search /data/workspace/wiki/entities/<slug>.md
       glob_search /data/workspace/wiki/concepts/<slug>.md
       ```

       - **Exists** → `file_edit` to append a new `### YYYY-MM-DD`
         section under `## Details`. Anchor on the `## Details` header
         or the most recent `### YYYY-MM-DD` subheader. Never rewrite
         old sections; always append.
       - **New** → `file_write` using the Page template below.

    4. **Write a synthesis only when load-bearing.** When a source
       connects multiple pre-existing entities/concepts in a way none of
       them individually captures. Trivial syntheses dilute the wiki.

    5. **Update the index.** `file_edit /data/workspace/wiki/index.md`
       to add a one-line entry under the right category header for any
       page you **created**. Don't touch entries for pages you only
       updated.

    6. **Append to the log.**

       ```
       file_edit /data/workspace/wiki/log.md
       ```

       ```
       2026-04-13 ingest: source=<filename>, created=[<pages>], updated=[<pages>]
       ```

    ### Query

    When Dan asks about a topic or you need accumulated knowledge:

    1. **Start with the index.**
       `file_read /data/workspace/wiki/index.md` — fast if well-maintained.
    2. **Fall back to search.** If the index doesn't surface anything:
       ```
       content_search /data/workspace/wiki/ <query>
       ```
       Absolute path is mandatory — relative paths return nothing.
    3. **Read candidate pages** with `file_read` at their full absolute
       paths. Synthesize the answer and cite page slugs in your reply
       (e.g., *"per [[dan-jacobsen]] and [[uptempo-positioning]]…"*).
    4. **File discoveries back.** If you learned something new while
       answering, append a dated `### YYYY-MM-DD` section to the
       relevant page. If Dan asked about something not captured, add
       `Gap: ...` under `## Open Questions` on the nearest existing
       page so lint can surface it later.
    5. **Append to the log.**
       ```
       2026-04-13 query: topic=<topic>, pages_read=[<slugs>], outcome=<answered|gap>
       ```

    ### Lint

    On-demand when Dan says "check the wiki", or via the optional
    `wiki-lint` cron (see design doc for bootstrap details). Checks:

    1. **Missing index entries** — every `.md` in `entities/`,
       `concepts/`, `syntheses/` has a corresponding line in `index.md`.
    2. **Orphaned index entries** — every index line points at a page
       that exists on disk.
    3. **Gap markers** — `content_search /data/workspace/wiki/ "Gap:"`;
       list unresolved open questions by page.
    4. **Stale active pages** — `Last updated:` > 30 days old but
       referenced by recent log entries or newer pages.

    Issues found → `send_user_message` with a short summary (one line
    per issue).
    Clean → exit silently. No news is good news; don't send "all clean".

    ## Page template

    Every page uses this exact structure:

    ```markdown
    # <Human-readable title>
    Category: entity | concept | synthesis
    Created: YYYY-MM-DD
    Last updated: YYYY-MM-DD
    Related: [[other-slug]], [[another-slug]]

    ## Summary

    One paragraph. What is this page about and why does it exist?

    ## Details

    ### YYYY-MM-DD
    - First fact or observation.
    - Second fact, with source citation if from an ingest.

    ## Open Questions

    - Gap: Unresolved question, prefixed for lint to catch.
    ```

    Slugs: lowercase, hyphens for spaces, no special characters.
    Filename without `.md` and without directory. Use in `[[link]]`
    cross-references; the directory resolves from the page's
    `Category:` field.

    **Reciprocal references:** if A links to B, add B → A as well.
    Keeps the wiki navigable either direction.

    A full worked example of a real entity page lives in the design doc.

    ## What goes where

    | Category | Directory | Examples |
    |----------|-----------|----------|
    | entity | `entities/` | People, projects, systems, services, vendors |
    | concept | `concepts/` | Technologies, decisions, design patterns |
    | synthesis | `syntheses/` | Cross-cutting analyses |

    When in doubt, prefer **concept** for abstract ideas and **entity**
    for things you could point at.

    ## Ingest triggers

    Trigger ingest when:
    - Dan shares a document or URL worth remembering.
    - A meeting summary completes with new decisions or action items.
    - A multi-step task ends with a lesson future sessions should know.
    - Dan makes a decision worth recording.
    - You resolve a `Gap:` marker during research.

    Do **not** ingest routine chatter, transient debugging notes, or
    content that duplicates an existing page without adding new
    information. A trivial page is worse than none — dilutes signal.

    ## Quick failure triage

    - `file_read` "not found" on a page you know exists → relative
      path. Retry with full `/data/workspace/wiki/...`.
    - `content_search` returns nothing for a known topic → same root
      cause; search path must be absolute.
    - `file_edit` "old_string not found" → anchor no longer matches.
      Re-read the page and pick a new anchor (`## Details` is safest).
    - `index.md` / `log.md` is 0 bytes → pre-v2.0 state. Run Bootstrap
      section before continuing.
    - Mid-turn provider timeouts with exponential backoff → context too
      big. Stop re-reading pages; finish from what you already have.

    Full failure-mode reference in the design doc
    (`docs/sam-skills/wiki-management-design.md`).
