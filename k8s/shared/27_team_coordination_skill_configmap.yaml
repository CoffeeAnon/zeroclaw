    # Team Coordination

    You share a Vikunja board with your counterpart (project #7,
    "Sam & Walter ops"). The task description is the work spec.
    The close-comment is the deliverable. Both sides can audit the
    board at any time, so the handoff is durable even if your
    session ends, times out, or gets interrupted.

    - **Sam** takes asks from Dan via Signal, delegates code/k8s
      work to Walter via this board + ACP.
    - **Walter** receives ACP sessions from Sam, reads the board
      for specs, ships results (usually PRs), and closes tasks
      with findings.

    ## If you are Sam

    Your `task-tracking` skill handles the parent task in your inbox
    (my-task). This skill handles the Walter delegation — the
    team-task and the ACP dispatch.

    **When Dan's ask needs code, k8s, or PR work:**

    Step 1 — Create the delegation spec:
    ```
    vikunja team-task create "<what Walter should do>" \
      --description "<full context: what, why, acceptance criteria>"
    ```

    Step 2 — Fire and forget:
    ```
    acp-client send "Team-task #N — see the description for details."
    ```
    Do NOT poll. Walter takes 3-10 minutes. Your turn will time out
    or get interrupted if you wait. The Vikunja board is how you get
    the result back — not the ACP session buffer.

    Step 3 — Reply to Dan immediately:
    *"Dispatched to Walter (team-task #N). I'll check back when
    he's done."*

    **On your next turn (or when Dan asks for status):**
    ```
    vikunja team-tasks
    ```
    If Walter closed the task, read his comment with
    `vikunja team-task show <id>`, relay findings to Dan, and close
    your parent task (`vikunja my-task done <parent> --comment "..."`).

    If the task is still open, tell Dan Walter is still working.

    **Close the team-task yourself if Walter can't.** If Walter hits
    an error (RBAC, timeout, crash), you still have the result in
    his ACP reply or your Signal conversation. Close the team-task
    with whatever you know:
    ```
    vikunja team-task done <id> --comment "Walter hit RBAC wall on
    llama namespace. Relayed to Dan. Needs RoleBinding fix."
    ```
    Never leave a team-task open when you already have the answer —
    open tasks look like pending work to future sessions.

    **When to delegate vs do it yourself:** if the work produces a
    PR, touches the cluster, or requires k8s/Gitea tooling, delegate.
    Research, wiki edits, Vikunja work, and Signal replies stay with
    you.

    ## If you are Walter

    **First action on EVERY ACP session:**

    ```
    vikunja team-tasks --open
    ```

    Match Sam's ACP message to an open task. If she references a
    task ID ("team-task #42"), read that one. If multiple are open,
    pick the most recent.

    **Workflow:**

    1. `vikunja team-task show <id>` — read the spec.
    2. Do the work.
    3. Close BEFORE replying to ACP:
       ```
       vikunja team-task done <id> --comment "<findings + PR URL>"
       ```
       This comment is what Sam reads when relaying to Dan. Make it
       self-contained — Sam may read it hours later in a different
       session.
    4. Reply via ACP with a short pointer. The comment has detail.

    **Close even on failure.** If you hit a permission error, missing
    resource, or any blocker, close the task with the error:
    ```
    vikunja team-task done <id> --comment "BLOCKED: RBAC — service
    account lacks get on deployments.apps in llama namespace."
    ```
    An open task with a failure comment is better than a stale TODO
    that looks like pending work.

    **Upward escalation:** if you discover something outside the
    delegated task, open a NEW team-task:
    ```
    vikunja team-task create "<what you found>" \
      --description "<why it matters, who should look at it>"
    ```
    Sam sees it on her next check. Don't bury escalations inside
    another task's close-comment �� separate tasks for separate
    concerns.

    ## Worked example

    Dan → Sam: *"Have Walter check the todolist deployment image."*

    Sam:
    ```
    $ vikunja team-task create "Check todolist deployment image version" \
        --description "Dan wants the current image tag for the vikunja deployment in todolist namespace."
    Task #130 created
    $ acp-client send "Team-task #130 — check the todolist deployment image version."
    PENDING acp_session_id=abc123
    ```
    Reply to Dan: *"Dispatched to Walter (team-task #130)."*

    Walter (ACP session):
    ```
    $ vikunja team-tasks --open
      #130 [TODO] Check todolist deployment image version
    $ vikunja team-task show 130
    $ kubectl get deploy -n todolist vikunja -o jsonpath='{.spec.template.spec.containers[0].image}'
    vikunja/vikunja:0.24.6
    $ vikunja team-task done 130 --comment "vikunja/vikunja:0.24.6"
    ```

    Sam (next turn):
    ```
    $ vikunja team-tasks
      #130 [DONE] Check todolist deployment image version
    $ vikunja team-task show 130
    ```
    Reply to Dan: *"Walter confirmed: vikunja/vikunja:0.24.6."*

    ## CLI reference

    ```
    vikunja team-tasks [--open] [--format text|json]
    vikunja team-task create "<title>" [--description ...] [--priority 1-5]
    vikunja team-task show   <id>
    vikunja team-task done   <id> [--comment "..."]
    vikunja team-task note   <id> "<progress>"
    ```

    ## Failure modes

    - Walter starts with no open team-tasks → stale ACP retry.
      Reply "no task in team board" and end the session.
    - ACP session times out before Walter finishes → the team-task
      stays open; Sam checks `team-tasks` on her next turn.
    - Walter can't complete (RBAC, missing resource) → close with
      the error in the comment. Don't leave it open.
