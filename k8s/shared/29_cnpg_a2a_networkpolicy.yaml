apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-a2a
  namespace: ai-agents
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: zeroclaw-a2a
  ingress:
    # Istio mTLS passthrough (ambient ztunnel pattern used by other
    # ai-agents workloads).
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # CNPG instance-manager HTTP probes (:8000). Left open (no from clause)
    # so kubelet probes + operator traffic + peer-pod checks all succeed
    # regardless of cilium identity resolution. The port only serves health
    # endpoints (/startupz, /readyz, /metrics) so the surface is tiny.
    - toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Postgres :5432 from Sam, Walter, and any peer CNPG pod (replication).
    - fromEndpoints:
        - matchLabels:
            app: zeroclaw
        - matchLabels:
            app: zeroclaw-k8s-agent
        - matchLabels:
            cnpg.io/cluster: zeroclaw-a2a
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
  egress:
    # DNS resolution.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Replication to peer CNPG pods.
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: zeroclaw-a2a
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # CNPG operator in cnpg-system namespace (status reports, webhook).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
            - port: "8080"
              protocol: TCP
    # Kubernetes API server (node IPs / control-plane).
    - toEntities:
        - kube-apiserver
    # Istio mTLS egress.
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # Rook RGW object store — barman-cloud plugin archives WAL + base
    # backups to s3://cnpg-a2a-backups/ on this endpoint. Port is the pod
    # targetPort (8080), not the Service port (80): Cilium evaluates
    # egress after DNAT against the backend pod.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: rook-ceph
            app: rook-ceph-rgw
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
